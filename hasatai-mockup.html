<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HasatAI · Akıllı Tarım Yönetim Platformu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
/* =========================================================
   HasatAI · Premium Tasarım Sistemi
   Koyu zümrüt yeşili + altın aksanlar + cam efektleri
   ========================================================= */

:root {
  /* Marka — derin orman yeşili */
  --brand-50:  #ecf6ef;
  --brand-100: #cfe6d6;
  --brand-200: #a5d3b1;
  --brand-300: #6db585;
  --brand-400: #3f9a5e;
  --brand-500: #2a7d47;
  --brand-600: #1e6238;
  --brand-700: #174a2c;
  --brand-800: #103420;
  --brand-900: #0a2316;
  --brand-950: #051509;

  /* Altın aksan — premium his */
  --gold-300: #e9d28f;
  --gold-400: #d4b85f;
  --gold-500: #b89a3f;
  --gold-600: #8f7528;

  /* Toprak */
  --earth-300: #cdb38a;
  --earth-500: #8a6a3f;
  --earth-700: #5a4226;

  /* Sky */
  --sky-300: #8cc6e5;
  --sky-500: #3b9bc7;
  --sky-700: #1d6691;

  /* Status */
  --success: #2a7d47;
  --warn:    #d99320;
  --danger:  #c8473b;
  --info:    #3b9bc7;

  /* Yüzeyler — koyu tema */
  --bg:        #f4f1ea;          /* açık krem zemin */
  --surface:   #ffffff;
  --surface-2: #faf8f3;
  --border:    #e6e1d6;
  --border-strong: #d6d0c2;

  /* Metin */
  --text:        #14241b;
  --text-soft:   #455349;
  --text-muted:  #7a8580;
  --text-on-dark: #ecf6ef;

  /* Sidebar — premium koyu yeşil */
  --side-bg:     #0a2316;
  --side-bg-2:   #0f3022;
  --side-text:   #c9dccf;
  --side-muted:  #6e8779;
  --side-active: rgba(212, 184, 95, 0.12);
  --side-border: rgba(255,255,255,0.06);

  /* Gölge */
  --shadow-sm:  0 1px 2px rgba(10, 35, 22, 0.05);
  --shadow:     0 4px 14px rgba(10, 35, 22, 0.08);
  --shadow-lg:  0 18px 50px rgba(10, 35, 22, 0.16);
  --shadow-xl:  0 30px 80px rgba(10, 35, 22, 0.22);

  --radius-sm: 8px;
  --radius:    14px;
  --radius-lg: 20px;
  --radius-xl: 28px;

  --font-display: 'Fraunces', Georgia, serif;
  --font-body:    'Inter', -apple-system, system-ui, sans-serif;
}

/* Reset */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
  overflow-x: hidden;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }
svg { display: block; }
img { max-width: 100%; display: block; }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* =========================================================
   LOGIN EKRANI
   ========================================================= */
.login-screen {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr;
  position: relative;
  background:
    radial-gradient(ellipse 80% 60% at 20% 0%, rgba(42, 125, 71, 0.95), transparent 60%),
    radial-gradient(ellipse 70% 60% at 80% 100%, rgba(212, 184, 95, 0.18), transparent 60%),
    linear-gradient(180deg, #0a2316 0%, #051509 100%);
}
.login-screen::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 25% 30%, rgba(255,255,255,0.04) 1px, transparent 1px),
    radial-gradient(circle at 75% 70%, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px, 60px 60px;
  pointer-events: none;
}
.login-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
  min-height: 100vh;
}
.login-card {
  width: 100%;
  max-width: 460px;
  background: linear-gradient(180deg, rgba(15, 48, 34, 0.85), rgba(10, 35, 22, 0.92));
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(212, 184, 95, 0.18);
  border-radius: var(--radius-xl);
  padding: 44px 40px;
  box-shadow: var(--shadow-xl);
  color: var(--text-on-dark);
}
.login-brand { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }
.brand-mark {
  width: 48px; height: 48px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--gold-400) 0%, var(--brand-500) 100%);
  display: grid; place-items: center;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 24px;
  color: #0a2316;
  box-shadow: 0 8px 24px rgba(212, 184, 95, 0.3);
}
.brand-mark svg { width: 26px; height: 26px; }
.brand-text { display: flex; flex-direction: column; line-height: 1.1; }
.brand-text .name { font-family: var(--font-display); font-weight: 700; font-size: 22px; color: #fff; letter-spacing: -0.01em; }
.brand-text .tag { font-size: 10px; color: var(--gold-300); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 4px; font-weight: 500; }

.login-headline {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 38px;
  line-height: 1.05;
  letter-spacing: -0.02em;
  color: #fff;
  margin-bottom: 12px;
}
.login-headline em { font-style: italic; color: var(--gold-300); font-weight: 500; }
.login-subtitle { color: rgba(236, 246, 239, 0.7); font-size: 14px; line-height: 1.6; margin-bottom: 32px; }

.field { margin-bottom: 18px; }
.field label { display: block; font-size: 12px; font-weight: 500; color: rgba(236, 246, 239, 0.75); margin-bottom: 8px; letter-spacing: 0.02em; }
.field input {
  width: 100%;
  padding: 14px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 14px;
  transition: all 0.2s;
  outline: none;
}
.field input::placeholder { color: rgba(236, 246, 239, 0.35); }
.field input:focus {
  background: rgba(255,255,255,0.08);
  border-color: var(--gold-400);
  box-shadow: 0 0 0 4px rgba(212, 184, 95, 0.12);
}

.btn-primary {
  width: 100%;
  padding: 14px 20px;
  background: linear-gradient(135deg, var(--brand-400), var(--brand-500));
  color: #fff;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.02em;
  border-radius: var(--radius-sm);
  transition: all 0.2s;
  box-shadow: 0 8px 24px rgba(42, 125, 71, 0.35);
  position: relative;
  overflow: hidden;
}
.btn-primary::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15), transparent);
  transform: translateX(-100%);
  transition: transform 0.6s;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(42, 125, 71, 0.45); }
.btn-primary:hover::before { transform: translateX(100%); }
.btn-primary:active { transform: translateY(0); }

.login-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 28px 0 18px;
  font-size: 11px; color: rgba(236, 246, 239, 0.4);
  letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500;
}
.login-divider::before, .login-divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
}

.demo-pills { display: flex; flex-wrap: wrap; gap: 8px; }
.demo-pill {
  padding: 8px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 100px;
  color: rgba(236, 246, 239, 0.85);
  font-size: 12px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
}
.demo-pill:hover { background: rgba(212, 184, 95, 0.12); border-color: var(--gold-400); color: #fff; }
.demo-pill .role-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold-400); }

/* =========================================================
   APP LAYOUT
   ========================================================= */
.app { display: none; min-height: 100vh; grid-template-columns: 260px 1fr; background: var(--bg); }
.app.is-active { display: grid; }

/* SIDEBAR */
.sidebar {
  background: linear-gradient(180deg, var(--side-bg-2) 0%, var(--side-bg) 100%);
  color: var(--side-text);
  display: flex;
  flex-direction: column;
  position: sticky; top: 0; left: 0;
  height: 100vh;
  border-right: 1px solid var(--side-border);
  z-index: 50;
}
.side-brand {
  padding: 22px 22px 18px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--side-border);
}
.side-brand .brand-mark { width: 40px; height: 40px; font-size: 20px; border-radius: 12px; }
.side-brand .name { font-size: 18px; }
.side-brand .tag { font-size: 9px; }

.side-section { padding: 18px 14px 8px; }
.side-section-title {
  font-size: 10px; letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--side-muted);
  font-weight: 600;
  padding: 0 10px 10px;
}
.side-nav { display: flex; flex-direction: column; gap: 2px; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  border-radius: 10px;
  color: var(--side-text);
  font-size: 13.5px; font-weight: 500;
  transition: all 0.15s;
  position: relative;
}
.nav-item:hover { background: rgba(255,255,255,0.04); color: #fff; }
.nav-item.is-active {
  background: var(--side-active);
  color: var(--gold-300);
  font-weight: 600;
}
.nav-item.is-active::before {
  content: '';
  position: absolute;
  left: -14px; top: 8px; bottom: 8px;
  width: 3px;
  background: var(--gold-400);
  border-radius: 0 3px 3px 0;
}
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.85; }
.nav-item.is-active svg { opacity: 1; }
.nav-badge {
  margin-left: auto;
  background: var(--danger);
  color: #fff;
  font-size: 10px; font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  min-width: 18px;
  text-align: center;
}

.side-user {
  margin-top: auto;
  padding: 14px;
  border-top: 1px solid var(--side-border);
}
.user-card {
  display: flex; align-items: center; gap: 10px;
  padding: 8px;
  border-radius: 12px;
  background: rgba(255,255,255,0.03);
}
.user-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-400), var(--brand-400));
  display: grid; place-items: center;
  font-weight: 700; color: #0a2316; font-size: 13px;
}
.user-info { flex: 1; min-width: 0; }
.user-info .name { color: #fff; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-info .role { color: var(--side-muted); font-size: 11px; }
.btn-logout {
  width: 30px; height: 30px;
  display: grid; place-items: center;
  border-radius: 8px;
  color: var(--side-muted);
  transition: all 0.15s;
}
.btn-logout:hover { background: rgba(200, 71, 59, 0.2); color: #ff8b80; }
.btn-logout svg { width: 16px; height: 16px; }

/* MAIN */
.main { min-width: 0; min-height: 100vh; display: flex; flex-direction: column; }
.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 18px 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 40;
  backdrop-filter: blur(8px);
}
.topbar .menu-toggle { display: none; }
.page-title { font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
.page-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.topbar-spacer { flex: 1; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: grid; place-items: center;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-soft);
  transition: all 0.15s;
  position: relative;
}
.icon-btn:hover { background: var(--brand-50); color: var(--brand-600); border-color: var(--brand-200); }
.icon-btn svg { width: 18px; height: 18px; }
.icon-btn .dot {
  position: absolute; top: 8px; right: 8px;
  width: 8px; height: 8px;
  background: var(--danger);
  border-radius: 50%;
  border: 2px solid var(--surface);
}

.content { padding: 28px; flex: 1; }

/* =========================================================
   COMPONENTS — kart, kpi, badge, vs.
   ========================================================= */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  box-shadow: var(--shadow-sm);
  transition: all 0.2s;
}
.card:hover { box-shadow: var(--shadow); }
.card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
.card-title { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -0.005em; }
.card-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

.grid { display: grid; gap: 18px; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-12 { grid-template-columns: repeat(12, 1fr); }
.col-3 { grid-column: span 3; }
.col-4 { grid-column: span 4; }
.col-6 { grid-column: span 6; }
.col-8 { grid-column: span 8; }
.col-12 { grid-column: span 12; }

/* KPI */
.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  position: relative;
  overflow: hidden;
  transition: all 0.2s;
}
.kpi:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.kpi-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: grid; place-items: center;
  background: var(--brand-50);
  color: var(--brand-600);
  margin-bottom: 14px;
}
.kpi-icon svg { width: 18px; height: 18px; }
.kpi-icon.gold { background: rgba(212, 184, 95, 0.12); color: var(--gold-600); }
.kpi-icon.sky  { background: rgba(59, 155, 199, 0.10); color: var(--sky-700); }
.kpi-icon.earth { background: rgba(138, 106, 63, 0.10); color: var(--earth-700); }
.kpi-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
.kpi-value { font-family: var(--font-display); font-size: 30px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; margin-top: 4px; }
.kpi-trend { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 500; margin-top: 8px; padding: 3px 8px; border-radius: 6px; }
.kpi-trend.up { background: rgba(42, 125, 71, 0.08); color: var(--success); }
.kpi-trend.down { background: rgba(200, 71, 59, 0.08); color: var(--danger); }

/* Hero card */
.hero-card {
  background: linear-gradient(135deg, var(--brand-700) 0%, var(--brand-900) 100%);
  border-radius: var(--radius-lg);
  padding: 32px;
  color: #fff;
  position: relative;
  overflow: hidden;
}
.hero-card::before {
  content: '';
  position: absolute; right: -80px; top: -80px;
  width: 280px; height: 280px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212, 184, 95, 0.18), transparent 70%);
}
.hero-card::after {
  content: '';
  position: absolute; left: -50px; bottom: -100px;
  width: 220px; height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.04), transparent 70%);
}
.hero-card > * { position: relative; }
.hero-greeting { font-size: 13px; color: var(--gold-300); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
.hero-title {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 600;
  margin-top: 8px;
  letter-spacing: -0.02em;
  line-height: 1.15;
}
.hero-title em { font-style: italic; color: var(--gold-300); font-weight: 500; }
.hero-meta { display: flex; flex-wrap: wrap; gap: 22px; margin-top: 18px; }
.hero-meta .item { display: flex; flex-direction: column; }
.hero-meta .item-label { font-size: 11px; color: rgba(236, 246, 239, 0.65); letter-spacing: 0.05em; text-transform: uppercase; }
.hero-meta .item-value { font-family: var(--font-display); font-size: 20px; font-weight: 600; margin-top: 2px; }

/* Badge */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 100px; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
.badge.success { background: rgba(42, 125, 71, 0.10); color: var(--success); }
.badge.warn    { background: rgba(217, 147, 32, 0.12); color: var(--warn); }
.badge.danger  { background: rgba(200, 71, 59, 0.10); color: var(--danger); }
.badge.info    { background: rgba(59, 155, 199, 0.10); color: var(--info); }
.badge.muted   { background: var(--surface-2); color: var(--text-muted); }

/* Tablo */
.table { width: 100%; border-collapse: collapse; }
.table th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text-muted); padding: 10px 12px; letter-spacing: 0.04em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
.table td { padding: 14px 12px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
.table tr:last-child td { border-bottom: none; }
.table tr:hover td { background: var(--surface-2); }

/* Buton varyantları */
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; transition: all 0.15s; border: 1px solid transparent; }
.btn-solid { background: var(--brand-600); color: #fff; }
.btn-solid:hover { background: var(--brand-700); }
.btn-outline { background: var(--surface); border-color: var(--border); color: var(--text-soft); }
.btn-outline:hover { background: var(--surface-2); border-color: var(--brand-300); color: var(--brand-700); }
.btn-ghost { color: var(--text-soft); }
.btn-ghost:hover { background: var(--surface-2); }
.btn-gold { background: linear-gradient(135deg, var(--gold-400), var(--gold-500)); color: #0a2316; font-weight: 600; }
.btn-gold:hover { box-shadow: 0 8px 20px rgba(212, 184, 95, 0.35); }
.btn svg { width: 14px; height: 14px; }

/* Map alanı */
.map-container { width: 100%; height: 360px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }

/* Chart */
.chart-box { position: relative; height: 240px; }
.chart-box-sm { position: relative; height: 160px; }
.chart-box-lg { position: relative; height: 320px; }

/* Liste itemleri */
.list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.list-item:last-child { border-bottom: none; }
.list-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: grid; place-items: center;
  background: var(--brand-50); color: var(--brand-600);
  flex-shrink: 0;
}
.list-icon svg { width: 16px; height: 16px; }
.list-icon.warn { background: rgba(217, 147, 32, 0.12); color: var(--warn); }
.list-icon.danger { background: rgba(200, 71, 59, 0.10); color: var(--danger); }
.list-icon.info { background: rgba(59, 155, 199, 0.10); color: var(--info); }
.list-text { flex: 1; min-width: 0; }
.list-title { font-size: 13.5px; font-weight: 500; color: var(--text); }
.list-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.list-meta { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

/* Sensor card */
.sensor-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  cursor: pointer;
  transition: all 0.2s;
}
.sensor-card:hover { border-color: var(--brand-300); transform: translateY(-2px); box-shadow: var(--shadow); }

.sensor-name { font-size: 13px; font-weight: 600; color: var(--text); }
.sensor-loc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.sensor-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: grid; place-items: center;
  background: var(--brand-50); color: var(--brand-600);
}
.sensor-icon svg { width: 16px; height: 16px; }
.sensor-value { font-family: var(--font-display); font-size: 30px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
.sensor-unit { font-size: 13px; color: var(--text-muted); margin-left: 4px; font-weight: 500; }
.sensor-bar { margin-top: 12px; height: 4px; background: var(--surface-2); border-radius: 4px; overflow: hidden; }
.sensor-bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--brand-400), var(--brand-500)); border-radius: 4px; }

/* Parsel kartı */
.parcel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
}
.parcel-card:hover { border-color: var(--brand-300); transform: translateY(-2px); box-shadow: var(--shadow); }
.parcel-img {
  height: 120px;
  background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
  position: relative;
  display: grid; place-items: center;
  color: #fff;
}
.parcel-img.tomato { background: linear-gradient(135deg, #c8473b, #8a2820); }
.parcel-img.wheat { background: linear-gradient(135deg, #d4b85f, #8f7528); }
.parcel-img.olive { background: linear-gradient(135deg, #6e7d3f, #3a4220); }
.parcel-img.cucumber { background: linear-gradient(135deg, #5a8a3f, #2a4a20); }
.parcel-img.corn { background: linear-gradient(135deg, #e9d28f, #b89a3f); }
.parcel-img.grape { background: linear-gradient(135deg, #6a3a7a, #3a1a4a); }
.parcel-img svg { width: 50px; height: 50px; opacity: 0.4; }
.parcel-img .area-tag {
  position: absolute; bottom: 10px; left: 10px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
  padding: 4px 10px;
  border-radius: 100px;
  font-size: 11px; font-weight: 600;
  color: #fff;

.parcel-info { padding: 16px; }
.parcel-name { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--text); }
.parcel-crop { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.parcel-stats { display: flex; gap: 14px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.parcel-stat { flex: 1; }
.parcel-stat-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; font-weight: 500; }
.parcel-stat-value { font-size: 14px; font-weight: 600; color: var(--text); margin-top: 2px; }
.parcel-stat-value.success { color: var(--success); }
.parcel-stat-value.warn { color: var(--warn); }
.parcel-stat-value.danger { color: var(--danger); }

.weather-day {
  background: var(--surface-2);
  border-radius: var(--radius);
  padding: 16px 12px;
  text-align: center;
}
.weather-day .day { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; }
.weather-day .icon { font-size: 28px; margin: 8px 0; }
.weather-day .temp-high { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--text); }
.weather-day .temp-low { font-size: 12px; color: var(--text-muted); }

/* Görev kartı */
.task-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: flex; align-items: center; gap: 14px;
  transition: all 0.15s;
}
.task-card:hover { border-color: var(--brand-300); }
.task-checkbox {
  width: 22px; height: 22px;
  border: 2px solid var(--border-strong);
  border-radius: 6px;
  display: grid; place-items: center;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.task-checkbox:hover { border-color: var(--brand-500); }
.task-checkbox.checked { background: var(--brand-500); border-color: var(--brand-500); }
.task-checkbox.checked svg { width: 12px; height: 12px; color: #fff; }
.task-content { flex: 1; min-width: 0; }
.task-title { font-size: 13.5px; font-weight: 500; color: var(--text); }
.task-card.done .task-title { text-decoration: line-through; color: var(--text-muted); }
.task-meta { display: flex; gap: 8px; margin-top: 4px; font-size: 11px; color: var(--text-muted); }

/* Mobil */
.menu-toggle {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: grid; place-items: center;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-soft);
}

@media (max-width: 1100px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .col-8, .col-6, .col-4 { grid-column: span 12; }
  .grid-3 { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 760px) {
  .app { grid-template-columns: 1fr; }
  .sidebar {

  .content { padding: 18px; }
  .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
  .login-card { padding: 32px 24px; }
  .login-headline { font-size: 30px; }
  .hero-title { font-size: 24px; }
  .hero-card { padding: 24px; }
}

/* Animasyonlar */
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 0.4s ease-out backwards; }
.fade-up:nth-child(1) { animation-delay: 0.05s; }
.fade-up:nth-child(2) { animation-delay: 0.1s; }
.fade-up:nth-child(3) { animation-delay: 0.15s; }
.fade-up:nth-child(4) { animation-delay: 0.2s; }

/* Toast */
.toast-host { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 10px; z-index: 200; pointer-events: none; }

.toast.danger { background: var(--danger); }

   ========================================================= */
const api = {
  async login(email, password) {
    await sleep(200);
    const u = db.users.find(x => x.email === email && x.password === password);
    if (!u) throw new Error('Geçersiz bilgiler');
    return { user: u, token: 'mock-jwt-' + Math.random().toString(36).slice(2) };
  },
  parcels: () => Promise.resolve(db.parcels),
  parcel: (id) => Promise.resolve(db.parcels.find(p => p.id === id)),
  sensors: () => Promise.resolve(db.sensors),
  sensorReadings: (sensorId, hours = 24) => {
    const sensor = db.sensors.find(s => s.id === sensorId);
    if (!sensor) return Promise.resolve([]);
    return Promise.resolve(generateReadings(sensor, hours));
  },
  weather: () => Promise.resolve(db.weather),
  tasks: () => Promise.resolve(db.tasks),
  expenses: () => Promise.resolve(db.expenses),
  revenues: () => Promise.resolve(db.revenues),
  inventory: () => Promise.resolve(db.inventory),
  alerts: () => Promise.resolve(db.alerts),
  irrigationRecommendations: () => {
    return Promise.resolve(db.parcels.filter(p => p.status === 'growing').map(p => {
      const need = p.crop === 'Salatalık' ? 55 : p.crop === 'Domates' ? 45 : p.crop === 'Buğday' ? 35 : 30;
      const rain48h = db.weather.forecast.slice(0,2).reduce((s,d)=>s+d.rain,0);
      let decision = 'ok', reason = `Nem yeterli (%${p.moisture}).`;
      if (p.moisture < need - 10 && rain48h < 5) { decision = 'irrigate'; reason = `Nem %${p.moisture}, hedef %${need}. 48 saatte ${rain48h}mm yağmur. Sulama gerekli.`; }
      else if (p.moisture < need && rain48h >= 5) { decision = 'skip'; reason = `Nem düşük ama 48 saatte ${rain48h}mm yağmur bekleniyor. Sulamayı erteleyin.`; }
      else if (p.moisture >= need) { decision = 'ok'; reason = `Nem hedefin üzerinde (%${p.moisture} / hedef %${need}).`; }
      return { parcelId: p.id, parcelName: p.name, crop: p.crop, currentMoisture: p.moisture, targetMoisture: need, rain48h, decision, reason };
    }));
  }
};

const sleep = (ms) => new Promise(r => setTimeout(r, ms));

function generateReadings(sensor, hours) {
  const out = [];
  const now = Date.now();
  let v = sensor.value;
  for (let i = hours; i >= 0; i--) {
    const t = now - i * 3600 * 1000;
    const noise = (Math.random() - 0.5) * (sensor.value * 0.08);
    v = Math.max(0, sensor.value + noise + Math.sin(i / 4) * (sensor.value * 0.05));
    out.push({ time: t, value: +v.toFixed(2) });
  }
  return out;
}

/* =========================================================

   ========================================================= */
async function login() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  try {
    const { user, token } = await api.login(email, pass);
    state.user = user;
    state.token = token;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.add('is-active');
    renderSidebar();
    navigateTo('dashboard');
    toast(`Hoş geldin, ${user.name.split(' ')[0]}!`, 'success');
  } catch (e) {
    toast(e.message, 'danger');
  }
}
function quickLogin(email) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = 'demo1234';
  login();
}
function logout() {
  state.user = null; state.token = null;
  document.getElementById('app').classList.remove('is-active');
  document.getElementById('loginScreen').style.display = 'grid';
  destroyCharts();
}

/* =========================================================
   Sidebar
   ========================================================= */
function renderSidebar() {
  const main = document.getElementById('navMain');
  const admin = document.getElementById('navAdmin');
  main.innerHTML = NAV.filter(n => n.section === 'main').map(navItemHtml).join('');
  admin.innerHTML = NAV.filter(n => n.section === 'admin').map(navItemHtml).join('');
  const u = state.user;
  document.getElementById('userAvatar').textContent = u.name.charAt(0);
  document.getElementById('userName').textContent = u.name;
  document.getElementById('userRole').textContent = u.roleName;
}
function navItemHtml(n) {
  return `
    <a class="nav-item ${state.page === n.id ? 'is-active' : ''}" onclick="navigateTo('${n.id}')">
      ${iconSvg(n.icon)}
      <span>${n.label}</span>
      ${n.badge ? `<span class="nav-badge">${n.badge}</span>` : ''}
    </a>`;
}

/* =========================================================
   Sayfa yönlendirme
   ========================================================= */
function navigateTo(page) {
  state.page = page;
  destroyCharts();
  renderSidebar();
  const meta = PAGE_TITLES[page];
  document.getElementById('pageTitle').textContent = meta.title;
  document.getElementById('pageSubtitle').textContent = meta.subtitle;
  document.getElementById('sidebar').classList.remove('is-open');
  const renderer = pageRenderers[page] || (() => `<div class="card">Yakında...</div>`);
  document.getElementById('content').innerHTML = renderer();
  // Chart/map setup'larını render sonrası başlat
  setTimeout(() => pageHooks[page] && pageHooks[page](), 50);
  window.scrollTo(0, 0);
}

function destroyCharts() {
  Object.values(state.charts).forEach(c => { try { c.destroy(); } catch(e){} });
  state.charts = {};
  if (state.map) { try { state.map.remove(); } catch(e){} state.map = null; }
}

          let pct = 0;
          if (s.type === 'soil_moisture' || s.type === 'air_humidity' || s.type === 'tank_level') pct = s.value;

          const lowBat = s.battery < 20;
          return `
            <div class="sensor-card fade-up" onclick="showSensorChart('${s.id}')" style="animation-delay:${i*0.03}s;">
              <div class="head">

  irrigation: () => {
    const recs = db.parcels.filter(p => p.status === 'growing').map(p => {

      const rain48h = db.weather.forecast.slice(0,2).reduce((s,d)=>s+d.rain,0);
      let decision = 'ok', reason = `Nem yeterli (%${p.moisture}). Sulama gerekmez.`, badge = 'success', label = 'İyi';
      if (p.moisture < need - 10 && rain48h < 5) { decision='irrigate'; reason=`Nem %${p.moisture}, hedef %${need}. 48 saatte ${rain48h}mm yağmur. Sulama gerekli.`; badge='danger'; label='Sula!'; }
      else if (p.moisture < need && rain48h >= 5) { decision='skip'; reason=`Nem düşük ama 48 saatte ${rain48h}mm yağmur bekleniyor. Sulamayı erteleyin.`; badge='info'; label='Bekle'; }
      else if (p.moisture < need) { decision='watch'; reason=`Nem hedefin biraz altında. Yarınki tahminle tekrar değerlendirin.`; badge='warn'; label='Takip'; }
      return { ...p, need, rain48h, decision, reason, badge, label };

              <div><div style="font-size:11px;color:var(--gold-300);text-transform:uppercase;letter-spacing:0.05em;">Bekle (yağmur)</div><div style="font-family:var(--font-display);font-size:26px;font-weight:600;">${recs.filter(r=>r.decision==='skip').length}</div></div>

                  <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${i.category}</div>
                </div>
                ${isCritical ? '<span class="badge danger">⚠️ Kritik</span>' : '<span class="badge success">Stokta</span>'}
              </div>
              <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:10px;">
                <div style="font-family:var(--font-display);font-size:30px;font-weight:600;color:${isCritical?'var(--danger)':'var(--text)'};">${i.stock}</div>
                <div style="font-size:13px;color:var(--text-muted);">${i.unit}</div>
                <div style="margin-left:auto;font-size:12px;color:var(--text-muted);">Min: ${i.min} ${i.unit}</div>
              </div>
              <div class="sensor-bar" style="height:6px;"><span style="width:${pct}%;background:${isCritical?'linear-gradient(90deg,var(--danger),#e85d50)':'linear-gradient(90deg,var(--brand-400),var(--brand-500))'};"></span></div>
              <div style="display:flex;justify-content:space-between;margin-top:12px;font-size:12px;color:var(--text-muted);">
                <span>Birim maliyet: ₺${i.cost}</span>
                <span>Toplam: <strong style="color:var(--text);">₺${(i.stock*i.cost).toLocaleString('tr-TR')}</strong></span>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  },

  alerts: () => {
    return `
      <div style="margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <span class="badge danger">${db.alerts.filter(a=>a.severity==='danger').length} kritik</span>
          <span class="badge warn">${db.alerts.filter(a=>a.severity==='warn').length} uyarı</span>
          <span class="badge info">${db.alerts.filter(a=>a.severity==='info').length} bilgi</span>
        </div>
        <button class="btn btn-outline">Tümünü okundu işaretle</button>
      </div>

      <div style="display:flex;flex-direction:column;gap:10px;">
        ${db.alerts.map((a,i) => {
          const p = db.parcels.find(x => x.id === a.parcelId);
          const iconName = { frost:'thermometer', low_moisture:'droplet', wind:'wind', rain:'cloud-rain', low_battery:'cpu', low_stock:'package', overdue_task:'alert' }[a.type] || 'alert';
          return `
            <div class="card fade-up" style="animation-delay:${i*0.04}s;border-left:4px solid var(--${a.severity==='danger'?'danger':a.severity==='warn'?'warn':'info'});">
              <div style="display:flex;gap:14px;align-items:flex-start;">
                <div class="list-icon ${a.severity}" style="width:42px;height:42px;">${iconSvg(iconName)}</div>
                <div style="flex:1;">
                  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
                    <div>
                      <div style="font-family:var(--font-display);font-size:16px;font-weight:600;">${a.title}</div>
                      ${p ? `<div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${p.name}</div>`:''}
                    </div>
                    <span style="font-size:12px;color:var(--text-muted);white-space:nowrap;">${a.time}</span>
                  </div>
                  <p style="font-size:13.5px;color:var(--text-soft);margin-top:10px;line-height:1.5;">${a.message}</p>
                  <div style="display:flex;gap:8px;margin-top:14px;">
                    <button class="btn btn-outline" style="padding:6px 12px;font-size:12px;">Detay</button>
                    <button class="btn btn-ghost" style="padding:6px 12px;font-size:12px;">Okundu işaretle</button>
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  },

  reports: () => {
    return `
      <div class="grid grid-2" style="gap:16px;">
        ${[
          { title: 'Parsel Üretim Raporu', desc: 'Her parsel için ekim, hasat ve verim verileri', icon:'layers' },
          { title: 'Maliyet Raporu', desc: 'Ürün ve parsel bazında detaylı maliyet analizi', icon:'dollar' },
          { title: 'Gelir & Kârlılık', desc: 'Aylık gelir, gider ve kâr-zarar tabloları', icon:'trending' },
          { title: 'Sulama Raporu', desc: 'Sulama geçmişi ve su tüketim analizi', icon:'droplet' },
          { title: 'Sensör Geçmişi', desc: 'Tüm sensör verilerinin grafik dökümü', icon:'cpu' },
          { title: 'NDVI/Uydu Raporu', desc: 'Uydu verisi tabanlı bitki sağlığı analizi', icon:'sun' }
        ].map((r,i) => `
          <div class="card fade-up" style="cursor:pointer;animation-delay:${i*0.05}s;" onclick="toast('Rapor üretiliyor...','success')">
            <div style="display:flex;align-items:flex-start;gap:14px;">
              <div class="kpi-icon">${iconSvg(r.icon)}</div>
              <div style="flex:1;">
                <div style="font-family:var(--font-display);font-size:16px;font-weight:600;">${r.title}</div>
                <p style="font-size:13px;color:var(--text-muted);margin-top:6px;">${r.desc}</p>
                <div style="display:flex;gap:8px;margin-top:14px;">
                  <button class="btn btn-outline" style="padding:6px 12px;font-size:12px;">📄 PDF</button>
                  <button class="btn btn-outline" style="padding:6px 12px;font-size:12px;">📊 Excel</button>
                </div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }
};

/* =========================================================
   Page hooks (charts, maps)
   ========================================================= */
const pageHooks = {
  dashboard: () => {
    const ctx = document.getElementById('moistureChart');
    if (!ctx) return;
    const labels = Array.from({length:24}, (_,i) => `${(23-i)}sa önce`).reverse();
    const datasets = db.parcels.slice(0,4).map((p, i) => {
      const colors = ['#2a7d47', '#d4b85f', '#3b9bc7', '#8a6a3f'];
      const data = Array.from({length:25}, (_,j) => Math.max(15, Math.min(70, p.moisture + Math.sin(j/3 + i)*8 + (Math.random()-0.5)*4)));
      return { label: p.name, data, borderColor: colors[i], backgroundColor: colors[i]+'20', tension: 0.4, fill: false, borderWidth: 2, pointRadius: 0, pointHoverRadius: 4 };
    });
    state.charts.moisture = new Chart(ctx, {
      type: 'line',
      data: { labels: [...labels, 'Şimdi'], datasets },
      options: chartOptions('%')
    });
  },

  parcels: () => {
    const el = document.getElementById('parcelMap');
    if (!el) return;
    state.map = L.map('parcelMap').setView([db.farm.lat, db.farm.lng], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(state.map);
    db.parcels.forEach(p => {
      const color = p.moisture < 30 ? '#c8473b' : p.moisture < 40 ? '#d99320' : '#2a7d47';
      L.circleMarker([p.lat, p.lng], { radius: 14, color: '#fff', weight: 3, fillColor: color, fillOpacity: 0.85 })
        .addTo(state.map)
        .bindPopup(`<strong>${p.name}</strong><br>${p.crop} · ${p.areaDa} dönüm<br>Nem: %${p.moisture}`);
    });
    db.sensors.forEach(s => {
      L.circleMarker([s.lat, s.lng], { radius: 5, color: '#0a2316', weight: 1, fillColor: '#d4b85f', fillOpacity: 1 })
        .addTo(state.map)
        .bindTooltip(`${sensorMeta[s.type]?.label}: ${s.value}${s.unit}`);
    });
  },

  finance: () => {
    const cats = {};
    db.expenses.forEach(e => { cats[e.category] = (cats[e.category]||0) + e.amount; });
    const ctx1 = document.getElementById('expenseDonut');
    if (ctx1) {
      state.charts.donut = new Chart(ctx1, {
        type: 'doughnut',
        data: {
          labels: Object.keys(cats),
          datasets: [{ data: Object.values(cats), backgroundColor: ['#2a7d47','#d4b85f','#3b9bc7','#8a6a3f','#c8473b','#6db585','#1e6238','#5a8a3f'], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'right', labels: { font: { family: "'Inter'", size: 12 }, padding: 12 } } } }
      });
    }
    const byParcel = {};
    db.expenses.forEach(e => {
      const p = db.parcels.find(x => x.id === e.parcelId);
      if (!p) return;
      byParcel[p.name] = (byParcel[p.name]||0) + e.amount;
    });
    const ctx2 = document.getElementById('parcelBar');
    if (ctx2) {
      state.charts.bar = new Chart(ctx2, {
        type: 'bar',
        data: {
          labels: Object.keys(byParcel),
          datasets: [{ label: 'Maliyet (₺)', data: Object.values(byParcel), backgroundColor: '#2a7d47', borderRadius: 6 }]
        },
        options: { ...chartOptions('₺'), indexAxis: 'y', plugins: { legend: { display: false } } }
      });
    }
  }
};

function chartOptions(unit) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { position: 'top', labels: { font: { family: "'Inter'", size: 11 }, color: '#455349', usePointStyle: true, padding: 10 } },
      tooltip: { backgroundColor: '#0a2316', titleFont: { family: "'Inter'", weight: 600 }, bodyFont: { family: "'Inter'" }, padding: 10, cornerRadius: 8 }
    },
    scales: {
      x: { grid: { display: false }, ticks: { font: { family: "'Inter'", size: 10 }, color: '#7a8580' } },
      y: { grid: { color: '#e6e1d6' }, ticks: { font: { family: "'Inter'", size: 10 }, color: '#7a8580', callback: v => v + (unit||'') }, beginAtZero: false }
    }
  };
}

/* =========================================================
   Etkileşim helpers
   ========================================================= */
function toggleTask(id) {
  const t = db.tasks.find(x => x.id === id);
  if (!t) return;
  t.status = t.status === 'completed' ? 'planned' : 'completed';
  if (t.status === 'completed') t.completedAt = new Date().toISOString().slice(0,10);
  toast(`Görev ${t.status === 'completed' ? 'tamamlandı' : 'açıldı'}: ${t.title}`, 'success');
  navigateTo('tasks');
}

function showParcelDetail(id) {
  const p = db.parcels.find(x => x.id === id);
  toast(`${p.name} detay ekranı yakında...`, 'success');
}

function showSensorChart(id) {
  const s = db.sensors.find(x => x.id === id);
  if (!s) return;
  const meta = sensorMeta[s.type];
  toast(`${meta.label} (${s.value}${s.unit}) — son 24 saat grafiği yakında`, 'success');
}

function taskStatusLabel(s) {
  return { planned: 'Planlandı', in_progress: 'Devam ediyor', completed: 'Tamamlandı', overdue: 'Gecikti' }[s] || s;
}
function taskBadge(s) {
  return { planned: 'muted', in_progress: 'info', completed: 'success', overdue: 'danger' }[s] || 'muted';
}
function priorityLabel(p) { return { low: 'Düşük', medium: 'Orta', high: 'Yüksek', urgent: 'Acil' }[p] || p; }
function priorityBadge(p) { return { low: 'muted', medium: 'info', high: 'warn', urgent: 'danger' }[p] || 'muted'; }

function formatDate(d) {
  if (!d) return '—';
  const date = new Date(d);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((date - today) / (1000*60*60*24));
  if (diff === 0) return 'Bugün';
  if (diff === 1) return 'Yarın';
  if (diff === -1) return 'Dün';
  return date.toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' });
}

function toast(msg, type='') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toastHost').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(8px)'; }, 2400);
  setTimeout(() => el.remove(), 2800);
}

/* =========================================================
   Gerçek zamanlı sensör simülasyonu
   ========================================================= */
setInterval(() => {
  if (!state.user) return;
  db.sensors.forEach(s => {
    const noise = (Math.random() - 0.5) * (s.value * 0.04);
    s.value = Math.max(0, +(s.value + noise).toFixed(2));
  });
}, 8000);

/* Enter ile login */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') {
    login();
  }
});
</script>
