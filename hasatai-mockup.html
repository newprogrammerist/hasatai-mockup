/* ============ ALERTS ============ */
App.pages.alerts = function() {
  const alerts = this.fAlerts();
  const grouped = { danger: alerts.filter(a => a.severity === 'danger'), warn: alerts.filter(a => a.severity === 'warn'), info: alerts.filter(a => a.severity === 'info') };

  const card = (a) => {
    const parcel = a.parcelId ? this.fParcels().find(p => p.id === a.parcelId) : null;
    return `
      <div class="card fade-up" style="display:flex;gap:14px;border-left:4px solid var(${a.severity==='danger'?'--danger':a.severity==='warn'?'--warn':'--info'});align-items:flex-start;">
        <div class="list-icon ${a.severity}" style="width:44px;height:44px;flex-shrink:0;">${this.iconSvg('alert')}</div>
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;">
            <div>
              <div style="font-family:var(--font-display);font-size:15px;font-weight:600;">${a.title}</div>
              <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${a.time}${parcel?' · '+parcel.name:''}</div>
            </div>
            <div style="display:flex;gap:6px;">
              <span class="badge ${a.severity==='danger'?'danger':a.severity==='warn'?'warn':'info'}">${a.severity==='danger'?'Kritik':a.severity==='warn'?'Uyarı':'Bilgi'}</span>
              ${!a.isRead ? '<span class="badge gold">Yeni</span>' : ''}
            </div>
          </div>
          <p style="margin-top:10px;color:var(--text-soft);font-size:13px;line-height:1.5;">${a.message}</p>
          <div style="display:flex;gap:8px;margin-top:12px;">
            ${!a.isRead ? `<button class="btn btn-outline" style="padding:6px 12px;font-size:12px;" onclick="App.markAlertRead('${a.id}')">Okundu işaretle</button>` : ''}
            ${this.can('delete') ? `<button class="btn btn-danger" style="padding:6px 12px;font-size:12px;" onclick="App.deleteAlert('${a.id}')">${this.iconSvg('trash')} Sil</button>` : ''}
          </div>
        </div>
      </div>
    `;
  };

  return `
    <div style="margin-bottom:20px;display:flex;gap:8px;flex-wrap:wrap;">
      <span class="badge muted">${alerts.length} toplam</span>
      <span class="badge danger">${grouped.danger.length} kritik</span>
      <span class="badge warn">${grouped.warn.length} uyarı</span>
      <span class="badge info">${grouped.info.length} bilgi</span>
    </div>
    ${alerts.length === 0 ? `
      <div class="card empty-state">
        <div class="empty-state-icon" style="background:rgba(42,125,71,0.1);color:var(--brand-500);">${this.iconSvg('check')}</div>
        <div class="empty-state-title">Aktif uyarı yok 🌱</div>
        <div class="empty-state-text">Tüm sistemler normal çalışıyor.</div>
      </div>
    ` : `
    ${grouped.danger.length ? `<h3 style="font-family:var(--font-display);font-size:16px;font-weight:600;margin:20px 0 12px;color:var(--danger);">⚠️ Kritik Uyarılar</h3>
      <div style="display:flex;flex-direction:column;gap:12px;">${grouped.danger.map(card).join('')}</div>` : ''}
    ${grouped.warn.length ? `<h3 style="font-family:var(--font-display);font-size:16px;font-weight:600;margin:20px 0 12px;color:var(--warn);">Uyarılar</h3>
      <div style="display:flex;flex-direction:column;gap:12px;">${grouped.warn.map(card).join('')}</div>` : ''}
    ${grouped.info.length ? `<h3 style="font-family:var(--font-display);font-size:16px;font-weight:600;margin:20px 0 12px;color:var(--info);">Bilgilendirme</h3>
      <div style="display:flex;flex-direction:column;gap:12px;">${grouped.info.map(card).join('')}</div>` : ''}`}
  `;
};

    <div style="margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
      <div><h2 style="font-family:var(--font-display);font-size:18px;font-weight:600;">Hazır & Özel Raporlar</h2></div>
      <button class="btn btn-gold" onclick="App.openCustomReportForm()">${this.iconSvg('plus')} Özel Rapor Oluştur</button>

    <div class="grid grid-3" style="gap:16px;margin-bottom:30px;">
      ${[
        { id:'pl', title:'Kar-Zarar Raporu', desc:'Gelir, gider, net kâr ve marj analizi', icon:'dollar' },
        { id:'season', title:'Sezon Performansı', desc:'Ürün bazlı verim ve maliyet karşılaştırması', icon:'trending' },
        { id:'yield', title:'Verim Raporu', desc:'Geçmiş hasat ve dönüm başına verim', icon:'package' },
        { id:'env', title:'Çevresel Etki', desc:'Su, gübre, ilaç kullanım izleri', icon:'droplet' },
        { id:'fuel', title:'Yakıt & Maliyet', desc:'Mazot tüketim ve birim maliyet detayı', icon:'fuel' },
        { id:'energy', title:'Enerji Üretimi', desc:'Solar/rüzgar üretim ve tasarruf', icon:'zap' },
        { id:'team', title:'Ekip Performansı', desc:'Görev tamamlama ve iş yükü', icon:'users' },
        { id:'audit', title:'Denetim Kaydı', desc:'Tüm işlem geçmişi ve değişiklikler', icon:'file' },
        { id:'cks', title:'ÇKS Raporu', desc:'Bakanlık kayıt için hazır format', icon:'file' }
      ].map((r,i) => `
        <div class="card fade-up" style="animation-delay:${i*0.04}s;cursor:pointer;" onclick="App.toast('${r.title} raporu üretildi (demo)','success')">
          <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--brand-50),var(--brand-100));color:var(--brand-600);display:grid;place-items:center;margin-bottom:12px;">${this.iconSvg(r.icon)}</div>
          <div style="font-family:var(--font-display);font-size:15px;font-weight:600;">${r.title}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:4px;line-height:1.5;">${r.desc}</div>
          <div style="display:flex;gap:6px;margin-top:14px;">
            <button class="btn btn-outline" style="padding:5px 10px;font-size:11px;flex:1;">PDF</button>
            <button class="btn btn-outline" style="padding:5px 10px;font-size:11px;flex:1;">Excel</button>
          </div>
        </div>
      `).join('')}
    </div>

    <h3 style="font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:14px;">⚙️ Özel Raporlarınız</h3>
    ${customReports.length === 0 ? `
      <div class="card empty-state" style="padding:40px 20px;">
        <div class="empty-state-text">Henüz özel rapor oluşturmadınız. Yapı taşlarını birleştirerek kendi raporunuzu tasarlayın.</div>
        <button class="btn btn-gold" style="margin-top:12px;" onclick="App.openCustomReportForm()">${this.iconSvg('plus')} İlk Özel Raporu Oluştur</button>
      </div>
    ` : `
    <div class="grid grid-2" style="gap:16px;">
      ${customReports.map(r => `
        <div class="card fade-up">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
            <div>
              <div style="font-family:var(--font-display);font-size:16px;font-weight:600;">${r.name}</div>
              <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">Güncelleme: ${this.fmtDate(r.updatedAt)} · ${r.blocks.length} blok</div>
            </div>
            <div style="display:flex;gap:4px;">
              <button class="icon-btn" style="width:30px;height:30px;" onclick="App.openCustomReportForm('${r.id}')">${this.iconSvg('edit')}</button>
              <button class="icon-btn" style="width:30px;height:30px;" onclick="App.deleteCustomReport('${r.id}')">${this.iconSvg('trash')}</button>
            </div>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${r.blocks.map(b => `<span class="badge muted">${blocks.find(x=>x.id===b)?.label || b}</span>`).join('')}
          </div>
          <button class="btn btn-gold" style="margin-top:14px;width:100%;" onclick="App.toast('Rapor üretildi (demo)','success')">📄 Raporu Üret</button>
        </div>
      `).join('')}
    </div>`}
  `;
};
</script>
<script>
/* ===========================================================
   CRUD Form Handlers
   Her modül için: openXForm() · saveX() · deleteX()
   =========================================================== */

/* ============ HELPER: form footer ============ */
App.formFooter = function(saveAction, label='Kaydet') {
  return `
    <button class="btn btn-outline" onclick="App.closeModal()">Vazgeç</button>
    <button class="btn btn-gold" onclick="${saveAction}">${label}</button>
  `;
};

/* ============ PARCEL CRUD ============ */
App.openParcelForm = function(id) {
  if (!this.can('edit')) { this.toast('Yetkiniz yok','danger'); return; }
  const p = id ? db.parcels.find(x => x.id === id) : null;
  const farm = db.farms.find(f => f.id === this.farmId());
  this.openModal({
    title: p ? 'Parsel Düzenle' : 'Yeni Parsel',
    body: `
      <div class="form-group"><label>Parsel Adı <span class="required">*</span></label><input id="pName" value="${p?p.name:''}" placeholder="ör. Domates Tarlası A"></div>
      <div class="form-row">
        <div class="form-group"><label>Ürün <span class="required">*</span></label><input id="pCrop" value="${p?p.crop:''}" placeholder="Domates, Buğday..."></div>
        <div class="form-group"><label>Çeşit</label><input id="pVariety" value="${p?p.variety:''}" placeholder="H-2274"></div>
      </div>
      <div class="form-row three">
        <div class="form-group"><label>Alan (dönüm) <span class="required">*</span></label><input id="pArea" type="number" step="0.1" value="${p?p.areaDa:''}"></div>
        <div class="form-group"><label>Toprak Tipi</label>
          <select id="pSoil">
            <option ${p&&p.soilType==='Tınlı'?'selected':''}>Tınlı</option>
            <option ${p&&p.soilType==='Killi'?'selected':''}>Killi</option>
            <option ${p&&p.soilType==='Kumlu'?'selected':''}>Kumlu</option>
            <option ${p&&p.soilType==='Kireçli'?'selected':''}>Kireçli</option>
          </select>
        </div>
        <div class="form-group"><label>Durum</label>
          <select id="pStatus">
            <option value="planning" ${p&&p.status==='planning'?'selected':''}>Planlama</option>
            <option value="growing" ${p&&p.status==='growing'?'selected':''}>Büyüme</option>
            <option value="harvest" ${p&&p.status==='harvest'?'selected':''}>Hasat</option>
            <option value="fallow" ${p&&p.status==='fallow'?'selected':''}>Nadas</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Ekim Tarihi</label><input id="pPlanted" type="date" value="${p&&p.planted?p.planted:''}"></div>
        <div class="form-group"><label>Hasat Tarihi</label><input id="pHarvest" type="date" value="${p&&p.harvest?p.harvest:''}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Mevcut Nem (%)</label><input id="pMoisture" type="number" min="0" max="100" value="${p?p.moisture:30}"></div>
        <div class="form-group"><label>NDVI (0-1)</label><input id="pNdvi" type="number" step="0.01" min="0" max="1" value="${p?p.ndvi:0.5}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Enlem (lat)</label><input id="pLat" type="number" step="0.0001" value="${p?p.lat:farm.lat}"></div>
        <div class="form-group"><label>Boylam (lng)</label><input id="pLng" type="number" step="0.0001" value="${p?p.lng:farm.lng}"></div>
      </div>
    `,
    footer: this.formFooter(`App.saveParcel(${id?`'${id}'`:'null'})`)
  });
};

App.saveParcel = function(id) {
  const name = document.getElementById('pName').value.trim();
  const crop = document.getElementById('pCrop').value.trim();
  if (!name || !crop) { this.toast('İsim ve ürün zorunlu','danger'); return; }
  const cropClass = (crop.toLowerCase().includes('domates')?'tomato':crop.toLowerCase().includes('buğday')||crop.toLowerCase().includes('bugday')?'wheat':crop.toLowerCase().includes('zeytin')?'olive':crop.toLowerCase().includes('salatalık')||crop.toLowerCase().includes('salatalik')?'cucumber':crop.toLowerCase().includes('mısır')||crop.toLowerCase().includes('misir')?'corn':crop.toLowerCase().includes('üzüm')||crop.toLowerCase().includes('uzum')?'grape':crop.toLowerCase().includes('pamuk')?'cotton':crop.toLowerCase().includes('biber')?'pepper':'tomato');
  const data = {
    farmId: this.farmId(),
    name, crop, cropClass,
    variety: document.getElementById('pVariety').value.trim(),
    areaDa: parseFloat(document.getElementById('pArea').value) || 0,
    soilType: document.getElementById('pSoil').value,
    status: document.getElementById('pStatus').value,
    planted: document.getElementById('pPlanted').value || null,
    harvest: document.getElementById('pHarvest').value || null,
    moisture: parseInt(document.getElementById('pMoisture').value) || 30,
    ndvi: parseFloat(document.getElementById('pNdvi').value) || 0.5,
    lat: parseFloat(document.getElementById('pLat').value),
    lng: parseFloat(document.getElementById('pLng').value)
  };
  if (id) {
    Object.assign(db.parcels.find(x => x.id === id), data);
    this.toast('Parsel güncellendi','success');
  } else {
    db.parcels.push({ id: this.uid('p'), ...data });
    this.toast('Parsel eklendi','success');
  }
  Storage.save(db);
  this.closeModal();
  this.navigateTo('parcels');
};

App.deleteParcel = function(id) {
  if (!this.can('delete')) { this.toast('Silme yetkiniz yok','danger'); return; }
  const p = db.parcels.find(x => x.id === id);
  this.confirm('Parseli sil', `<strong>${p.name}</strong> parselini silmek istediğinizden emin misiniz? Buna bağlı sensör ve görevler de etkilenebilir.`, () => {
    db.parcels = db.parcels.filter(x => x.id !== id);
    Storage.save(db);
    this.toast('Parsel silindi','success');
    this.navigateTo('parcels');
  });
};

/* ============ SENSOR CRUD ============ */
App.openSensorForm = function(id) {
  if (!this.can('edit')) { this.toast('Yetkiniz yok','danger'); return; }
  const s = id ? db.sensors.find(x => x.id === id) : null;
  const parcels = this.fParcels();
  const farm = db.farms.find(f => f.id === this.farmId());
  this.openModal({
    title: s ? 'Sensör Düzenle' : 'Yeni Sensör',
    body: `
      <div class="form-group"><label>Sensör Adı <span class="required">*</span></label><input id="sName" value="${s?s.name:''}" placeholder="ör. Toprak Nem #1"></div>
      <div class="form-row">
        <div class="form-group"><label>Tip <span class="required">*</span></label>
          <select id="sType">
            ${Object.entries(sensorMeta).map(([k,v]) => `<option value="${k}" ${s&&s.type===k?'selected':''}>${v.label}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Parsel</label>
          <select id="sParcel">
            <option value="">— Genel (parsele bağlı değil) —</option>
            ${parcels.map(p => `<option value="${p.id}" ${s&&s.parcelId===p.id?'selected':''}>${p.name}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row three">
        <div class="form-group"><label>Mevcut Değer</label><input id="sValue" type="number" step="0.1" value="${s?s.value:0}"></div>
        <div class="form-group"><label>Birim</label><input id="sUnit" value="${s?s.unit:''}" placeholder="%, °C, pH..."></div>
        <div class="form-group"><label>Pil (%)</label><input id="sBattery" type="number" min="0" max="100" value="${s?s.battery:100}"></div>
      </div>
      <div class="form-group"><label>Cihaz ID</label><input id="sDevice" value="${s?s.deviceId:''}" placeholder="TTN-LSE01-XXX"></div>
      <div class="form-row">
        <div class="form-group"><label>Enlem</label><input id="sLat" type="number" step="0.0001" value="${s?s.lat:farm.lat}"></div>
        <div class="form-group"><label>Boylam</label><input id="sLng" type="number" step="0.0001" value="${s?s.lng:farm.lng}"></div>
      </div>
    `,
    footer: this.formFooter(`App.saveSensor(${id?`'${id}'`:'null'})`)
  });
};

App.saveSensor = function(id) {
  const name = document.getElementById('sName').value.trim();
  if (!name) { this.toast('İsim zorunlu','danger'); return; }
  const data = {
    farmId: this.farmId(),
    name,
    type: document.getElementById('sType').value,
    parcelId: document.getElementById('sParcel').value || null,
    value: parseFloat(document.getElementById('sValue').value) || 0,
    unit: document.getElementById('sUnit').value.trim(),
    battery: parseInt(document.getElementById('sBattery').value) || 100,
    deviceId: document.getElementById('sDevice').value.trim(),
    lat: parseFloat(document.getElementById('sLat').value),
    lng: parseFloat(document.getElementById('sLng').value),
    status: 'active'
  };
  if (id) {
    Object.assign(db.sensors.find(x => x.id === id), data);
    this.toast('Sensör güncellendi','success');
  } else {
    db.sensors.push({ id: this.uid('s'), ...data });
    this.toast('Sensör eklendi','success');
  }
  Storage.save(db);
  this.closeModal();
  this.navigateTo('sensors');
};

App.deleteSensor = function(id) {
  if (!this.can('delete')) return;
  const s = db.sensors.find(x => x.id === id);
  this.confirm('Sensörü sil', `<strong>${s.name}</strong> sensörünü silmek istediğinizden emin misiniz?`, () => {
    db.sensors = db.sensors.filter(x => x.id !== id);
    Storage.save(db);
    this.toast('Sensör silindi','success');
    this.navigateTo('sensors');
  });
};

/* ============ TASK CRUD ============ */
App.openTaskForm = function(id) {
  if (!this.can('edit')) return;
  const t = id ? db.tasks.find(x => x.id === id) : null;
  const parcels = this.fParcels();
  const members = this.fMembers().map(m => db.users.find(u => u.id === m.userId)).filter(Boolean);
  this.openModal({
    title: t ? 'Görev Düzenle' : 'Yeni Görev',
    body: `
      <div class="form-group"><label>Başlık <span class="required">*</span></label><input id="tTitle" value="${t?t.title:''}" placeholder="ör. Domates Tarlası — Sulama"></div>
      <div class="form-row">
        <div class="form-group"><label>Tip</label>
          <select id="tType">
            ${['irrigation','pesticide','fertilize','pruning','harvest','maintenance','analysis','planting','other'].map(x => `<option value="${x}" ${t&&t.type===x?'selected':''}>${taskTypeLabel(x)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Parsel</label>
          <select id="tParcel">
            <option value="">— Genel —</option>
            ${parcels.map(p => `<option value="${p.id}" ${t&&t.parcelId===p.id?'selected':''}>${p.name}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row three">
        <div class="form-group"><label>Bitiş Tarihi <span class="required">*</span></label><input id="tDue" type="date" value="${t?t.due:''}"></div>
        <div class="form-group"><label>Öncelik</label>
          <select id="tPriority">
            ${['low','medium','high','urgent'].map(x => `<option value="${x}" ${t&&t.priority===x?'selected':''}>${priorityLabel(x)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Durum</label>
          <select id="tStatus">
            ${['planned','in_progress','completed','overdue'].map(x => `<option value="${x}" ${t&&t.status===x?'selected':''}>${taskStatusLabel(x)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group"><label>Atanan Kişi</label>
        <select id="tAssignee">
          <option value="">— Atanmadı —</option>
          ${members.map(u => `<option value="${u.id}" ${t&&t.assignedTo===u.id?'selected':''}>${u.name}</option>`).join('')}
        </select>
      </div>
    `,
    footer: this.formFooter(`App.saveTask(${id?`'${id}'`:'null'})`)
  });
};

App.saveTask = function(id) {
  const title = document.getElementById('tTitle').value.trim();
  const due = document.getElementById('tDue').value;
  if (!title || !due) { this.toast('Başlık ve tarih zorunlu','danger'); return; }
  const data = {
    farmId: this.farmId(),
    title,
    type: document.getElementById('tType').value,
    parcelId: document.getElementById('tParcel').value || null,
    due,
    priority: document.getElementById('tPriority').value,
    status: document.getElementById('tStatus').value,
    assignedTo: document.getElementById('tAssignee').value || null
  };
  if (id) {
    Object.assign(db.tasks.find(x => x.id === id), data);
    this.toast('Görev güncellendi','success');
  } else {
    db.tasks.push({ id: this.uid('t'), ...data, createdAt: new Date().toISOString().slice(0,10) });
    this.toast('Görev eklendi','success');
  }
  Storage.save(db);
  this.closeModal();
  this.navigateTo('tasks');
};

App.toggleTask = function(id) {
  const t = db.tasks.find(x => x.id === id);
  if (!t) return;
  if (t.status === 'completed') { t.status = 'planned'; t.completedAt = null; }
  else { t.status = 'completed'; t.completedAt = new Date().toISOString().slice(0,10); }
  Storage.save(db);
  this.navigateTo('tasks');
};

App.deleteTask = function(id) {
  if (!this.can('delete')) return;
  const t = db.tasks.find(x => x.id === id);
  this.confirm('Görevi sil', `<strong>${t.title}</strong> görevini silmek istediğinizden emin misiniz?`, () => {
    db.tasks = db.tasks.filter(x => x.id !== id);
    Storage.save(db);
    this.toast('Görev silindi','success');
    this.navigateTo('tasks');
  });
};

/* ============ EXPENSE CRUD ============ */
App.openExpenseForm = function(id) {
  if (!this.can('finance')) return;
  const e = id ? db.expenses.find(x => x.id === id) : null;
  const parcels = this.fParcels();
  this.openModal({
    title: e ? 'Gider Düzenle' : 'Yeni Gider',
    body: `
      <div class="form-row">
        <div class="form-group"><label>Kategori <span class="required">*</span></label>
          <select id="eCategory">
            ${['Tohum','Gübre','İlaç','İşçilik','Mazot','Sulama','Bakım','Ekipman','Diğer'].map(c => `<option ${e&&e.category===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Tutar (₺) <span class="required">*</span></label><input id="eAmount" type="number" step="0.01" value="${e?e.amount:''}" placeholder="0.00"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Tarih <span class="required">*</span></label><input id="eDate" type="date" value="${e?e.date:new Date().toISOString().slice(0,10)}"></div>
        <div class="form-group"><label>Parsel</label>
          <select id="eParcel">
            <option value="">— Genel —</option>
            ${parcels.map(p => `<option value="${p.id}" ${e&&e.parcelId===p.id?'selected':''}>${p.name}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group"><label>Açıklama</label><textarea id="eDesc" rows="2">${e?e.desc:''}</textarea></div>
    `,
    footer: this.formFooter(`App.saveExpense(${id?`'${id}'`:'null'})`)
  });
};

App.saveExpense = function(id) {
  const amount = parseFloat(document.getElementById('eAmount').value);
  if (!amount || amount <= 0) { this.toast('Geçerli tutar girin','danger'); return; }
  const data = {
    farmId: this.farmId(),
    category: document.getElementById('eCategory').value,
    amount,
    date: document.getElementById('eDate').value,
    parcelId: document.getElementById('eParcel').value || null,
    desc: document.getElementById('eDesc').value.trim()
  };
  if (id) { Object.assign(db.expenses.find(x => x.id === id), data); this.toast('Gider güncellendi','success'); }
  else { db.expenses.push({ id: this.uid('e'), ...data }); this.toast('Gider eklendi','success'); }
  Storage.save(db);
  this.closeModal();
  this.navigateTo('finance');
};

App.deleteExpense = function(id) {
  if (!this.can('delete') || !this.can('finance')) return;
  this.confirm('Gideri sil', 'Bu gider kaydını silmek istediğinizden emin misiniz?', () => {
    db.expenses = db.expenses.filter(x => x.id !== id);
    Storage.save(db);
    this.toast('Gider silindi','success');
    this.navigateTo('finance');
  });
};

/* ============ REVENUE CRUD ============ */
App.openRevenueForm = function(id) {
  if (!this.can('finance')) return;
  const r = id ? db.revenues.find(x => x.id === id) : null;
  const parcels = this.fParcels();
  this.openModal({
    title: r ? 'Gelir Düzenle' : 'Yeni Gelir',
    body: `
      <div class="form-row">
        <div class="form-group"><label>Ürün <span class="required">*</span></label><input id="rProduct" value="${r?r.product:''}" placeholder="Domates"></div>
        <div class="form-group"><label>Parsel</label>
          <select id="rParcel">
            <option value="">— Genel —</option>
            ${parcels.map(p => `<option value="${p.id}" ${r&&r.parcelId===p.id?'selected':''}>${p.name}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row three">
        <div class="form-group"><label>Miktar (kg) <span class="required">*</span></label><input id="rQty" type="number" step="0.1" value="${r?r.quantity:''}"></div>
        <div class="form-group"><label>Birim Fiyat (₺) <span class="required">*</span></label><input id="rPrice" type="number" step="0.01" value="${r?r.unitPrice:''}"></div>
        <div class="form-group"><label>Tarih</label><input id="rDate" type="date" value="${r?r.date:new Date().toISOString().slice(0,10)}"></div>
      </div>
      <div class="form-group"><label>Alıcı</label><input id="rBuyer" value="${r?r.buyer:''}" placeholder="Migros, Tariş..."></div>
    `,
    footer: this.formFooter(`App.saveRevenue(${id?`'${id}'`:'null'})`)
  });
};

App.saveRevenue = function(id) {
  const product = document.getElementById('rProduct').value.trim();

  const l = id ? db.livingExpenses.find(x => x.id === id) : null;

    title: l ? 'Yaşam Gideri Düzenle' : 'Yeni Yaşam Gideri',
    body: `
      <div class="form-row">
        <div class="form-group"><label>Kategori <span class="required">*</span></label>
          <select id="lvCat">
            ${['Elektrik (ev)','Su','Doğalgaz','Mutfak/Yemek','İnternet/Telefon','Konut Bakım','Su Motoru Elektrik','Sulama Motoru Yakıt','Diğer'].map(c => `<option ${l&&l.category===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Tutar (₺) <span class="required">*</span></label><input id="lvAmt" type="number" step="0.01" value="${l?l.amount:0}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Tarih</label><input id="lvDate" type="date" value="${l?l.date:new Date().toISOString().slice(0,10)}"></div>
        <div class="form-group"><label>Dönem</label><input id="lvPeriod" value="${l?l.period:new Date().toISOString().slice(0,7)}" placeholder="2026-04"></div>
      </div>
      <div class="form-group"><label>Sayaç No</label><input id="lvMeter" value="${l?l.meter:''}" placeholder="EL-001"></div>
      <div class="form-group"><label>Açıklama</label><textarea id="lvDesc" rows="2">${l?l.desc:''}</textarea></div>
    `,
    footer: this.formFooter(`App.saveLiving(${id?`'${id}'`:'null'})`)
  });
};

App.saveLiving = function(id) {
  const amount = parseFloat(document.getElementById('lvAmt').value);
  if (!amount || amount <= 0) { this.toast('Geçerli tutar girin','danger'); return; }
  const data = {
    farmId: this.farmId(),
    category: document.getElementById('lvCat').value,
    amount,
    date: document.getElementById('lvDate').value,
    period: document.getElementById('lvPeriod').value.trim(),
    meter: document.getElementById('lvMeter').value.trim() || '-',
    desc: document.getElementById('lvDesc').value.trim()
  };
  if (id) { Object.assign(db.livingExpenses.find(x => x.id === id), data); this.toast('Gider güncellendi','success'); }
  else { db.livingExpenses.push({ id: this.uid('lv'), ...data }); this.toast('Gider eklendi','success'); }
  Storage.save(db);
  this.closeModal();
  this.navigateTo('living');
};

App.deleteLiving = function(id) {
  if (!this.can('delete') || !this.can('finance')) return;
  this.confirm('Gideri sil', 'Bu yaşam giderini silmek istediğinizden emin misiniz?', () => {
    db.livingExpenses = db.livingExpenses.filter(x => x.id !== id);
    Storage.save(db);
    this.toast('Silindi','success');
    this.navigateTo('living');
  });
};

/* ============ MEMBER MANAGEMENT ============ */
App.openMemberInviteForm = function() {
  if (!this.can('manage_team')) { this.toast('Yetkiniz yok','danger'); return; }
  this.openModal({
    title: 'Üye Davet Et',
    subtitle: 'Mevcut bir kullanıcıyı bu çiftliğe ekle',
    body: `
      <div class="form-group"><label>Kullanıcı E-posta <span class="required">*</span></label>
        <select id="mvEmail">
          ${db.users.filter(u => !db.memberships.some(m => m.userId === u.id && m.farmId === this.farmId())).map(u => `<option value="${u.id}">${u.name} (${u.email})</option>`).join('')}
        </select>
        <div class="help">Sistemde kayıtlı, henüz bu çiftliğin üyesi olmayan kullanıcılar listelenir.</div>
      </div>
      <div class="form-group"><label>Rol <span class="required">*</span></label>
        <select id="mvRole">
          <option value="consultant">Danışman (görüntüle + düzenle)</option>
          <option value="field_staff">Saha Personeli (görev tamamla)</option>
          <option value="viewer">İzleyici (sadece görüntüle)</option>
          <option value="owner">Sahibi (tam yetki)</option>
        </select>
      </div>
    `,
    footer: this.formFooter('App.inviteMember()','Davet Et')
  });
};

App.inviteMember = function() {
  const userId = document.getElementById('mvEmail').value;
  const role = document.getElementById('mvRole').value;
  if (!userId) { this.toast('Kullanıcı seçin','danger'); return; }
  db.memberships.push({
    id: this.uid('m'), userId, farmId: this.farmId(), role,
    joinedAt: new Date().toISOString().slice(0,10)
  });
  Storage.save(db);
  this.closeModal();
  this.toast('Üye eklendi','success');
  this.navigateTo('team');
};

App.changeMemberRole = function(id) {
  const m = db.memberships.find(x => x.id === id);
  const u = db.users.find(x => x.id === m.userId);
  this.openModal({
    title: 'Rol Değiştir',
    subtitle: u.name,
    body: `
      <div class="form-group"><label>Yeni Rol</label>
        <select id="mrRole">
          <option value="owner" ${m.role==='owner'?'selected':''}>Sahibi</option>
          <option value="consultant" ${m.role==='consultant'?'selected':''}>Danışman</option>
          <option value="field_staff" ${m.role==='field_staff'?'selected':''}>Saha Personeli</option>
          <option value="viewer" ${m.role==='viewer'?'selected':''}>İzleyici</option>
        </select>
      </div>
    `,
    footer: this.formFooter(`App.saveMemberRole('${id}')`)
  });
};

App.saveMemberRole = function(id) {
  const m = db.memberships.find(x => x.id === id);
  m.role = document.getElementById('mrRole').value;
  Storage.save(db);
  this.closeModal();
  this.toast('Rol güncellendi','success');
  this.navigateTo('team');
};

App.removeMember = function(id) {
  if (!this.can('manage_team')) return;
  const m = db.memberships.find(x => x.id === id);
  const u = db.users.find(x => x.id === m.userId);
  this.confirm('Üyeliği kaldır', `<strong>${u.name}</strong> kişisinin bu çiftlikteki üyeliğini kaldırmak istediğinizden emin misiniz?`, () => {
    db.memberships = db.memberships.filter(x => x.id !== id);
    Storage.save(db);
    this.toast('Üye kaldırıldı','success');
    this.navigateTo('team');
  });
};

/* ============ ALERT MANAGEMENT ============ */
App.markAlertRead = function(id) {
  const a = db.alerts.find(x => x.id === id);
  if (a) { a.isRead = true; Storage.save(db); this.navigateTo('alerts'); }
};

App.deleteAlert = function(id) {
  db.alerts = db.alerts.filter(x => x.id !== id);
  Storage.save(db);
  this.toast('Uyarı silindi','success');
  this.navigateTo('alerts');
};

/* ============ CUSTOM REPORT BUILDER ============ */
App.openCustomReportForm = function(id) {
  const r = id ? db.customReports.find(x => x.id === id) : null;
  const allBlocks = [
    { id:'revenue_summary',     label:'Gelir Özeti' },
    { id:'expense_summary',     label:'Gider Özeti' },
    { id:'net_profit',          label:'Net Kâr' },
    { id:'expense_by_category', label:'Kategori Bazlı Gider' },
    { id:'parcel_table',        label:'Parsel Tablosu' },
    { id:'ndvi_chart',          label:'NDVI Grafiği' },
    { id:'yield_summary',       label:'Verim Özeti' },
    { id:'irrigation_summary',  label:'Sulama Özeti' },
    { id:'fuel_summary',        label:'Yakıt Özeti' },
    { id:'energy_summary',      label:'Enerji Özeti' },
    { id:'living_summary',      label:'Yaşam Giderleri' },
    { id:'equipment_status',    label:'Ekipman Durumu' }
  ];
  const selected = r ? r.blocks : [];
  this.openModal({
    title: r ? 'Özel Raporu Düzenle' : 'Özel Rapor Oluştur',
    subtitle: 'İstediğiniz blokları seçin — rapor bu sırayla üretilir',
    body: `
      <div class="form-group"><label>Rapor Adı <span class="required">*</span></label><input id="crName" value="${r?r.name:''}" placeholder="ör. Aylık Performans"></div>
      <div class="form-group">
        <label>Rapor Blokları <span class="required">*</span></label>
        <div class="help">İstediğiniz blokları seçin. Her bir blok rapora bir bölüm ekler.</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;">
          ${allBlocks.map(b => `
            <label style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;cursor:pointer;">
              <input type="checkbox" class="cr-block" value="${b.id}" ${selected.includes(b.id)?'checked':''} style="width:auto;">
              <span style="font-size:13px;">${b.label}</span>
            </label>
          `).join('')}
        </div>
      </div>
    `,
    footer: this.formFooter(`App.saveCustomReport(${id?`'${id}'`:'null'})`),
    large: true
  });
};

App.saveCustomReport = function(id) {
  const name = document.getElementById('crName').value.trim();
  const blocks = Array.from(document.querySelectorAll('.cr-block:checked')).map(c => c.value);
  if (!name) { this.toast('Rapor adı zorunlu','danger'); return; }
  if (blocks.length === 0) { this.toast('En az bir blok seçin','danger'); return; }
  const today = new Date().toISOString().slice(0,10);
  if (id) {
    const r = db.customReports.find(x => x.id === id);
    Object.assign(r, { name, blocks, updatedAt: today });
    this.toast('Rapor güncellendi','success');
  } else {
    db.customReports.push({ id: this.uid('cr'), farmId: this.farmId(), userId: this.state.user.id, name, blocks, createdAt: today, updatedAt: today });
    this.toast('Rapor oluşturuldu','success');
  }
  Storage.save(db);
  this.closeModal();
  this.navigateTo('reports');
};

App.deleteCustomReport = function(id) {
  this.confirm('Raporu sil', 'Bu özel raporu silmek istediğinizden emin misiniz?', () => {
    db.customReports = db.customReports.filter(x => x.id !== id);
    Storage.save(db);
    this.toast('Rapor silindi','success');
    this.navigateTo('reports');
  });
};

/* ============ INITIALIZATION ============ */
App.init = function() {
  // Oturum varsa otomatik giriş
  if (db.session && db.session.userId) {
    const u = db.users.find(x => x.id === db.session.userId);
    if (u) {
      this.state.user = u;
      this.state.activeFarmId = db.session.activeFarmId;
      // Üyelik kontrolü
      const ok = (u.email === 'admin@hasatai.com') || db.memberships.some(m => m.userId === u.id && m.farmId === this.state.activeFarmId);
      if (!ok) {
        const firstMem = db.memberships.find(m => m.userId === u.id);
        if (firstMem) this.state.activeFarmId = firstMem.farmId;
      }
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').classList.add('is-active');
      this.renderSidebar();
      this.navigateTo('dashboard');
      return;
    }
  }

  // Modal dışına tıklayınca kapat
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target.id === 'modalOverlay') this.closeModal();
  });

  // Workspace dropdown dışına tıklayınca kapat
  document.addEventListener('click', (e) => {
    const dd = document.getElementById('workspaceDropdown');
    const cur = document.getElementById('workspaceCurrent');
    if (dd && cur && !cur.contains(e.target) && !dd.contains(e.target)) {
      dd.classList.remove('is-open');
    }
  });

  // ESC ile modal kapat
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') this.closeModal();
  });
};

// Sayfa yüklendiğinde başlat
document.addEventListener('DOMContentLoaded', () => App.init());
if (document.readyState !== 'loading') App.init();
</script>
