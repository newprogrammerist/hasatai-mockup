<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HasatAI · Akıllı Tarım Yönetim Platformu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --brand-50:#ecf6ef; --brand-100:#cfe6d6; --brand-200:#a5d3b1; --brand-300:#6db585;
  --brand-400:#3f9a5e; --brand-500:#2a7d47; --brand-600:#1e6238; --brand-700:#174a2c;
  --brand-800:#103420; --brand-900:#0a2316; --brand-950:#051509;
  --gold-300:#e9d28f; --gold-400:#d4b85f; --gold-500:#b89a3f; --gold-600:#8f7528;
  --earth-300:#cdb38a; --earth-500:#8a6a3f; --earth-700:#5a4226;
  --sky-300:#8cc6e5; --sky-500:#3b9bc7; --sky-700:#1d6691;
  --success:#2a7d47; --warn:#d99320; --danger:#c8473b; --info:#3b9bc7;
  --bg:#f4f1ea; --surface:#fff; --surface-2:#faf8f3;
  --border:#e6e1d6; --border-strong:#d6d0c2;
  --text:#14241b; --text-soft:#455349; --text-muted:#7a8580; --text-on-dark:#ecf6ef;
  --side-bg:#0a2316; --side-bg-2:#0f3022; --side-text:#c9dccf; --side-muted:#6e8779;
  --side-active:rgba(212,184,95,0.12); --side-border:rgba(255,255,255,0.06);
  --shadow-sm:0 1px 2px rgba(10,35,22,0.05); --shadow:0 4px 14px rgba(10,35,22,0.08);
  --shadow-lg:0 18px 50px rgba(10,35,22,0.16); --shadow-xl:0 30px 80px rgba(10,35,22,0.22);
  --radius-sm:8px; --radius:14px; --radius-lg:20px; --radius-xl:28px;
  --font-display:'Fraunces',Georgia,serif;
  --font-body:'Inter',-apple-system,system-ui,sans-serif;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { font-family:var(--font-body); font-size:14px; line-height:1.5; color:var(--text); background:var(--bg); -webkit-font-smoothing:antialiased; min-height:100vh; }
button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
input,select,textarea { font-family:inherit; font-size:inherit; color:inherit; }
a { color:inherit; text-decoration:none; }
svg { display:block; }
img { max-width:100%; display:block; }
::-webkit-scrollbar { width:10px; height:10px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:10px; border:2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }

/* ============ LOGIN ============ */
.login-screen { min-height:100vh; display:grid; grid-template-columns:1fr; position:relative;
  background:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(42,125,71,0.95),transparent 60%),radial-gradient(ellipse 70% 60% at 80% 100%,rgba(212,184,95,0.18),transparent 60%),linear-gradient(180deg,#0a2316 0%,#051509 100%); }
.login-screen::before { content:''; position:absolute; inset:0; background-image:radial-gradient(circle at 25% 30%,rgba(255,255,255,0.04) 1px,transparent 1px),radial-gradient(circle at 75% 70%,rgba(255,255,255,0.03) 1px,transparent 1px); background-size:40px 40px,60px 60px; pointer-events:none; }
.login-wrapper { position:relative; display:flex; align-items:center; justify-content:center; padding:32px 20px; min-height:100vh; }
.login-card { width:100%; max-width:460px; background:linear-gradient(180deg,rgba(15,48,34,0.85),rgba(10,35,22,0.92)); backdrop-filter:blur(20px); border:1px solid rgba(212,184,95,0.18); border-radius:var(--radius-xl); padding:44px 40px; box-shadow:var(--shadow-xl); color:var(--text-on-dark); }
.login-brand { display:flex; align-items:center; gap:14px; margin-bottom:32px; }
.brand-mark { width:48px; height:48px; border-radius:14px; background:linear-gradient(135deg,var(--gold-400) 0%,var(--brand-500) 100%); display:grid; place-items:center; font-family:var(--font-display); font-weight:700; font-size:24px; color:#0a2316; box-shadow:0 8px 24px rgba(212,184,95,0.3); }
.brand-mark svg { width:26px; height:26px; }
.brand-text { display:flex; flex-direction:column; line-height:1.1; }
.brand-text .name { font-family:var(--font-display); font-weight:700; font-size:22px; color:#fff; letter-spacing:-0.01em; }
.brand-text .tag { font-size:10px; color:var(--gold-300); letter-spacing:0.2em; text-transform:uppercase; margin-top:4px; font-weight:500; }
.login-headline { font-family:var(--font-display); font-weight:600; font-size:38px; line-height:1.05; letter-spacing:-0.02em; color:#fff; margin-bottom:12px; }
.login-headline em { font-style:italic; color:var(--gold-300); font-weight:500; }
.login-subtitle { color:rgba(236,246,239,0.7); font-size:14px; line-height:1.6; margin-bottom:32px; }
.field { margin-bottom:18px; }
.field label { display:block; font-size:12px; font-weight:500; color:rgba(236,246,239,0.75); margin-bottom:8px; letter-spacing:0.02em; }
.field input,.field select,.field textarea { width:100%; padding:14px 16px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:var(--radius-sm); color:#fff; font-size:14px; transition:all 0.2s; outline:none; }
.field input::placeholder { color:rgba(236,246,239,0.35); }
.field input:focus,.field select:focus,.field textarea:focus { background:rgba(255,255,255,0.08); border-color:var(--gold-400); box-shadow:0 0 0 4px rgba(212,184,95,0.12); }
.btn-primary { width:100%; padding:14px 20px; background:linear-gradient(135deg,var(--brand-400),var(--brand-500)); color:#fff; font-weight:600; font-size:14px; letter-spacing:0.02em; border-radius:var(--radius-sm); transition:all 0.2s; box-shadow:0 8px 24px rgba(42,125,71,0.35); position:relative; overflow:hidden; }
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 12px 32px rgba(42,125,71,0.45); }
.btn-primary:active { transform:translateY(0); }
.login-divider { display:flex; align-items:center; gap:12px; margin:28px 0 18px; font-size:11px; color:rgba(236,246,239,0.4); letter-spacing:0.2em; text-transform:uppercase; font-weight:500; }
.login-divider::before,.login-divider::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent); }
.demo-pills { display:flex; flex-wrap:wrap; gap:8px; }
.demo-pill { padding:8px 14px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:100px; color:rgba(236,246,239,0.85); font-size:12px; font-weight:500; display:inline-flex; align-items:center; gap:6px; transition:all 0.2s; }
.demo-pill:hover { background:rgba(212,184,95,0.12); border-color:var(--gold-400); color:#fff; }
.demo-pill .role-dot { width:6px; height:6px; border-radius:50%; background:var(--gold-400); }

/* ============ APP LAYOUT ============ */
.app { display:none; min-height:100vh; grid-template-columns:260px 1fr; background:var(--bg); }
.app.is-active { display:grid; }

.sidebar { background:linear-gradient(180deg,var(--side-bg-2) 0%,var(--side-bg) 100%); color:var(--side-text); display:flex; flex-direction:column; position:sticky; top:0; left:0; height:100vh; border-right:1px solid var(--side-border); z-index:50; overflow-y:auto; }
.side-brand { padding:22px 22px 18px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--side-border); }
.side-brand .brand-mark { width:40px; height:40px; font-size:20px; border-radius:12px; }
.side-brand .name { font-size:18px; }
.side-brand .tag { font-size:9px; }

/* Workspace switcher */
.workspace-switcher { padding:14px; border-bottom:1px solid var(--side-border); position:relative; }
.workspace-current { display:flex; align-items:center; gap:10px; padding:10px 12px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:10px; cursor:pointer; transition:all 0.15s; }
.workspace-current:hover { background:rgba(212,184,95,0.08); border-color:rgba(212,184,95,0.2); }
.workspace-icon { width:32px; height:32px; border-radius:8px; background:linear-gradient(135deg,var(--gold-400),var(--brand-400)); display:grid; place-items:center; color:#0a2316; font-weight:700; font-size:13px; flex-shrink:0; }
.workspace-info { flex:1; min-width:0; }
.workspace-name { color:#fff; font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.workspace-role { color:var(--gold-300); font-size:10px; letter-spacing:0.05em; text-transform:uppercase; font-weight:600; margin-top:1px; }
.workspace-chevron { color:var(--side-muted); flex-shrink:0; }
.workspace-chevron svg { width:14px; height:14px; }
.workspace-dropdown { position:absolute; top:calc(100% - 4px); left:14px; right:14px; background:#0f3022; border:1px solid rgba(212,184,95,0.2); border-radius:12px; box-shadow:var(--shadow-xl); overflow:hidden; z-index:60; display:none; }
.workspace-dropdown.is-open { display:block; }
.workspace-option { padding:10px 12px; display:flex; align-items:center; gap:10px; cursor:pointer; transition:background 0.15s; border-bottom:1px solid rgba(255,255,255,0.04); }
.workspace-option:last-child { border-bottom:none; }
.workspace-option:hover { background:rgba(212,184,95,0.08); }
.workspace-option.is-active { background:rgba(212,184,95,0.12); }

.side-section { padding:14px 14px 4px; }
.side-section-title { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--side-muted); font-weight:600; padding:0 10px 8px; }
.side-nav { display:flex; flex-direction:column; gap:2px; }
.nav-item { display:flex; align-items:center; gap:12px; padding:9px 12px; border-radius:10px; color:var(--side-text); font-size:13px; font-weight:500; transition:all 0.15s; position:relative; cursor:pointer; }
.nav-item:hover { background:rgba(255,255,255,0.04); color:#fff; }
.nav-item.is-active { background:var(--side-active); color:var(--gold-300); font-weight:600; }
.nav-item.is-active::before { content:''; position:absolute; left:-14px; top:8px; bottom:8px; width:3px; background:var(--gold-400); border-radius:0 3px 3px 0; }
.nav-item svg { width:17px; height:17px; flex-shrink:0; opacity:0.85; }
.nav-item.is-active svg { opacity:1; }
.nav-badge { margin-left:auto; background:var(--danger); color:#fff; font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; min-width:18px; text-align:center; }
.nav-item.locked { opacity:0.4; cursor:not-allowed; }
.nav-item.locked:hover { background:transparent; color:var(--side-text); }

.side-user { margin-top:auto; padding:14px; border-top:1px solid var(--side-border); }
.user-card { display:flex; align-items:center; gap:10px; padding:8px; border-radius:12px; background:rgba(255,255,255,0.03); }
.user-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--gold-400),var(--brand-400)); display:grid; place-items:center; font-weight:700; color:#0a2316; font-size:13px; }
.user-info { flex:1; min-width:0; }
.user-info .name { color:#fff; font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.user-info .role { color:var(--side-muted); font-size:11px; }
.btn-logout { width:30px; height:30px; display:grid; place-items:center; border-radius:8px; color:var(--side-muted); transition:all 0.15s; }
.btn-logout:hover { background:rgba(200,71,59,0.2); color:#ff8b80; }
.btn-logout svg { width:16px; height:16px; }

.main { min-width:0; min-height:100vh; display:flex; flex-direction:column; }
.topbar { display:flex; align-items:center; gap:16px; padding:18px 28px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:40; backdrop-filter:blur(8px); }
.topbar .menu-toggle { display:none; }
.page-title { font-family:var(--font-display); font-size:22px; font-weight:600; color:var(--text); letter-spacing:-0.01em; }
.page-subtitle { font-size:13px; color:var(--text-muted); margin-top:2px; }
.topbar-spacer { flex:1; }
.topbar-actions { display:flex; align-items:center; gap:8px; }
.icon-btn { width:38px; height:38px; border-radius:10px; display:grid; place-items:center; background:var(--surface-2); border:1px solid var(--border); color:var(--text-soft); transition:all 0.15s; position:relative; cursor:pointer; }
.icon-btn:hover { background:var(--brand-50); color:var(--brand-600); border-color:var(--brand-200); }
.icon-btn svg { width:18px; height:18px; }
.icon-btn .dot { position:absolute; top:8px; right:8px; width:8px; height:8px; background:var(--danger); border-radius:50%; border:2px solid var(--surface); }
.content { padding:28px; flex:1; }

/* ============ COMPONENTS ============ */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:22px; box-shadow:var(--shadow-sm); transition:all 0.2s; }
.card:hover { box-shadow:var(--shadow); }
.card-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:16px; }
.card-title { font-family:var(--font-display); font-size:16px; font-weight:600; color:var(--text); letter-spacing:-0.005em; }
.card-subtitle { font-size:12px; color:var(--text-muted); margin-top:2px; }

.grid { display:grid; gap:18px; }
.grid-2 { grid-template-columns:repeat(2,1fr); }
.grid-3 { grid-template-columns:repeat(3,1fr); }
.grid-4 { grid-template-columns:repeat(4,1fr); }
.grid-12 { grid-template-columns:repeat(12,1fr); }
.col-3 { grid-column:span 3; }
.col-4 { grid-column:span 4; }
.col-6 { grid-column:span 6; }
.col-8 { grid-column:span 8; }
.col-12 { grid-column:span 12; }

.kpi { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; position:relative; overflow:hidden; transition:all 0.2s; }
.kpi:hover { transform:translateY(-2px); box-shadow:var(--shadow); }
.kpi-icon { width:38px; height:38px; border-radius:10px; display:grid; place-items:center; background:var(--brand-50); color:var(--brand-600); margin-bottom:14px; }
.kpi-icon svg { width:18px; height:18px; }
.kpi-icon.gold { background:rgba(212,184,95,0.12); color:var(--gold-600); }
.kpi-icon.sky { background:rgba(59,155,199,0.10); color:var(--sky-700); }
.kpi-icon.earth { background:rgba(138,106,63,0.10); color:var(--earth-700); }
.kpi-icon.danger { background:rgba(200,71,59,0.10); color:var(--danger); }
.kpi-label { font-size:12px; color:var(--text-muted); font-weight:500; }
.kpi-value { font-family:var(--font-display); font-size:30px; font-weight:600; color:var(--text); letter-spacing:-0.02em; margin-top:4px; }
.kpi-trend { display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:500; margin-top:8px; padding:3px 8px; border-radius:6px; }
.kpi-trend.up { background:rgba(42,125,71,0.08); color:var(--success); }
.kpi-trend.down { background:rgba(200,71,59,0.08); color:var(--danger); }

.hero-card { background:linear-gradient(135deg,var(--brand-700) 0%,var(--brand-900) 100%); border-radius:var(--radius-lg); padding:32px; color:#fff; position:relative; overflow:hidden; }
.hero-card::before { content:''; position:absolute; right:-80px; top:-80px; width:280px; height:280px; border-radius:50%; background:radial-gradient(circle,rgba(212,184,95,0.18),transparent 70%); }
.hero-card > * { position:relative; }
.hero-greeting { font-size:13px; color:var(--gold-300); font-weight:500; letter-spacing:0.04em; text-transform:uppercase; }
.hero-title { font-family:var(--font-display); font-size:32px; font-weight:600; margin-top:8px; letter-spacing:-0.02em; line-height:1.15; }
.hero-title em { font-style:italic; color:var(--gold-300); font-weight:500; }
.hero-meta { display:flex; flex-wrap:wrap; gap:22px; margin-top:18px; }
.hero-meta .item { display:flex; flex-direction:column; }
.hero-meta .item-label { font-size:11px; color:rgba(236,246,239,0.65); letter-spacing:0.05em; text-transform:uppercase; }
.hero-meta .item-value { font-family:var(--font-display); font-size:20px; font-weight:600; margin-top:2px; }

.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:100px; font-size:11px; font-weight:600; letter-spacing:0.02em; }
.badge.success { background:rgba(42,125,71,0.10); color:var(--success); }
.badge.warn { background:rgba(217,147,32,0.12); color:var(--warn); }
.badge.danger { background:rgba(200,71,59,0.10); color:var(--danger); }
.badge.info { background:rgba(59,155,199,0.10); color:var(--info); }
.badge.muted { background:var(--surface-2); color:var(--text-muted); }
.badge.gold { background:rgba(212,184,95,0.12); color:var(--gold-600); }

.table { width:100%; border-collapse:collapse; }
.table th { text-align:left; font-size:11px; font-weight:600; color:var(--text-muted); padding:10px 12px; letter-spacing:0.04em; text-transform:uppercase; border-bottom:1px solid var(--border); }
.table td { padding:14px 12px; border-bottom:1px solid var(--border); font-size:13px; vertical-align:middle; }
.table tr:last-child td { border-bottom:none; }
.table tr:hover td { background:var(--surface-2); }
.table .actions { display:flex; gap:4px; justify-content:flex-end; }
.table .actions button { width:28px; height:28px; border-radius:6px; display:grid; place-items:center; color:var(--text-muted); transition:all 0.15s; }
.table .actions button:hover { background:var(--surface-2); color:var(--brand-600); }
.table .actions button.danger:hover { background:rgba(200,71,59,0.1); color:var(--danger); }
.table .actions svg { width:14px; height:14px; }

.btn { display:inline-flex; align-items:center; gap:8px; padding:9px 14px; border-radius:10px; font-size:13px; font-weight:500; transition:all 0.15s; border:1px solid transparent; cursor:pointer; }
.btn-solid { background:var(--brand-600); color:#fff; }
.btn-solid:hover { background:var(--brand-700); }
.btn-outline { background:var(--surface); border-color:var(--border); color:var(--text-soft); }
.btn-outline:hover { background:var(--surface-2); border-color:var(--brand-300); color:var(--brand-700); }
.btn-ghost { color:var(--text-soft); }
.btn-ghost:hover { background:var(--surface-2); }
.btn-gold { background:linear-gradient(135deg,var(--gold-400),var(--gold-500)); color:#0a2316; font-weight:600; }
.btn-gold:hover { box-shadow:0 8px 20px rgba(212,184,95,0.35); transform:translateY(-1px); }
.btn-danger { background:rgba(200,71,59,0.1); color:var(--danger); }
.btn-danger:hover { background:var(--danger); color:#fff; }
.btn svg { width:14px; height:14px; }

.map-container { width:100%; height:360px; border-radius:var(--radius); overflow:hidden; border:1px solid var(--border); }
.chart-box { position:relative; height:240px; }
.chart-box-sm { position:relative; height:160px; }
.chart-box-lg { position:relative; height:320px; }

.list-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
.list-item:last-child { border-bottom:none; }
.list-icon { width:36px; height:36px; border-radius:10px; display:grid; place-items:center; background:var(--brand-50); color:var(--brand-600); flex-shrink:0; }
.list-icon svg { width:16px; height:16px; }
.list-icon.warn { background:rgba(217,147,32,0.12); color:var(--warn); }
.list-icon.danger { background:rgba(200,71,59,0.10); color:var(--danger); }
.list-icon.info { background:rgba(59,155,199,0.10); color:var(--info); }
.list-icon.gold { background:rgba(212,184,95,0.12); color:var(--gold-600); }
.list-text { flex:1; min-width:0; }
.list-title { font-size:13.5px; font-weight:500; color:var(--text); }
.list-sub { font-size:12px; color:var(--text-muted); margin-top:2px; }
.list-meta { font-size:12px; color:var(--text-muted); white-space:nowrap; }

.sensor-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; cursor:pointer; transition:all 0.2s; }
.sensor-card:hover { border-color:var(--brand-300); transform:translateY(-2px); box-shadow:var(--shadow); }
.sensor-card .head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.sensor-name { font-size:13px; font-weight:600; color:var(--text); }
.sensor-loc { font-size:11px; color:var(--text-muted); margin-top:2px; }
.sensor-icon { width:32px; height:32px; border-radius:8px; display:grid; place-items:center; background:var(--brand-50); color:var(--brand-600); }
.sensor-icon svg { width:16px; height:16px; }
.sensor-value { font-family:var(--font-display); font-size:30px; font-weight:600; color:var(--text); letter-spacing:-0.02em; }
.sensor-unit { font-size:13px; color:var(--text-muted); margin-left:4px; font-weight:500; }
.sensor-bar { margin-top:12px; height:4px; background:var(--surface-2); border-radius:4px; overflow:hidden; }

  /* ============ AUTH ============ */
  login() {
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    const u = db.users.find(x => x.email === email && x.password === pass);
    if (!u) { this.toast('Geçersiz e-posta veya parola', 'danger'); return; }
    const memberships = db.memberships.filter(m => m.userId === u.id);
    if (memberships.length === 0 && u.email !== 'admin@hasatai.com') {
      this.toast('Hiç çiftliğe üye değilsiniz', 'danger'); return;
    }
    this.state.user = u;
    this.state.activeFarmId = memberships.length > 0 ? memberships[0].farmId : db.farms[0].id;
    db.session = { userId: u.id, activeFarmId: this.state.activeFarmId };
    Storage.save(db);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.add('is-active');
    this.renderSidebar();
    this.navigateTo('dashboard');
    this.toast(`Hoş geldin, ${u.name.split(' ')[0]}!`, 'success');
  },

    document.getElementById('email').value = email;

    if (this.state.user && this.state.user.email === 'admin@hasatai.com') return 'admin';
    const m = this.currentMembership();
    return m ? m.role : 'viewer';

  can(action) {
    const role = this.currentRole();
    const matrix = {
      // role : { action: bool }
      admin:        { all:true, view:true, edit:true, delete:true, finance:true, manage_team:true },
      owner:        { view:true, edit:true, delete:true, finance:true, manage_team:true },
      consultant:   { view:true, edit:true, delete:false, finance:true, manage_team:false },
      field_staff:  { view:true, edit:true, delete:false, finance:false, manage_team:false },
      viewer:       { view:true, edit:false, delete:false, finance:false, manage_team:false }
    };
    const perms = matrix[role] || matrix.viewer;
    return perms.all || perms[action] || false;

      dd.innerHTML = farms.map(f => `
        <div class="workspace-option ${f.id === this.state.activeFarmId ? 'is-active' : ''}" onclick="App.switchFarm('${f.id}')">
          <div class="workspace-icon" style="width:28px;height:28px;font-size:11px;">${f.name.charAt(0)}</div>
          <div class="workspace-info">
            <div class="workspace-name">${f.name}</div>
            <div class="workspace-role">${this.roleLabel(f.role || 'admin')} · ${f.city}</div>
          </div>
        </div>
      `).join('');
    }
    dd.classList.toggle('is-open');
  },

  /* ============ SIDEBAR ============ */
  renderSidebar() {
    const u = this.state.user;
    const farm = db.farms.find(f => f.id === this.state.activeFarmId);
    const role = this.currentRole();

    // Workspace
    document.getElementById('wsIcon').textContent = farm ? farm.name.charAt(0) : '?';
    document.getElementById('wsName').textContent = farm ? farm.name : '—';
    document.getElementById('wsRole').textContent = `${this.roleLabel(role)} · ${farm ? farm.city : ''}`;

    // User
    document.getElementById('userAvatar').textContent = u.name.charAt(0);
    document.getElementById('userName').textContent = u.name;
    document.getElementById('userRole').textContent = this.roleLabel(role);

    // Nav menu (RBAC ile filtrelenmiş)
    const navItem = (n) => {
      const isLocked = n.perm === 'finance' && !this.can('finance');
      const badges = this.getBadges(n.id);
      return `
        <a class="nav-item ${this.state.page === n.id ? 'is-active' : ''} ${isLocked ? 'locked' : ''}"
           ${isLocked ? '' : `onclick="App.navigateTo('${n.id}')"`}>
          ${this.iconSvg(n.icon)}
          <span>${n.label}</span>
          ${badges ? `<span class="nav-badge">${badges}</span>` : ''}
        </a>`;
    };
    document.getElementById('navMain').innerHTML       = this.NAV.filter(n => n.section === 'main').map(navItem).join('');
    document.getElementById('navOperation').innerHTML  = this.NAV.filter(n => n.section === 'operation').map(navItem).join('');
    document.getElementById('navAdmin').innerHTML      = this.NAV.filter(n => n.section === 'admin').map(navItem).join('');
  },

  getBadges(pageId) {
    const farmId = this.state.activeFarmId;
    if (pageId === 'tasks') {
      const overdue = db.tasks.filter(t => t.farmId === farmId && t.status === 'overdue').length;
      return overdue > 0 ? overdue : null;
    }
    if (pageId === 'alerts') {
      const unread = db.alerts.filter(a => a.farmId === farmId && !a.isRead).length;
      return unread > 0 ? unread : null;
    }
    return null;
  },

  /* ============ NAVIGATION ============ */
  navigateTo(page) {
    this.state.page = page;
    this.destroyCharts();
    this.renderSidebar();
    const meta = this.PAGE_TITLES[page] || { title:'', subtitle:'' };
    document.getElementById('pageTitle').textContent = meta.title;
    document.getElementById('pageSubtitle').textContent = meta.subtitle;
    document.getElementById('sidebar').classList.remove('is-open');
    const renderer = this.pages[page];
    document.getElementById('content').innerHTML = renderer ? renderer.call(this) : '<div class="card">Yakında...</div>';
    setTimeout(() => this.hooks[page] && this.hooks[page].call(this), 50);
    window.scrollTo(0, 0);
  },

  destroyCharts() {
    Object.values(this.state.charts).forEach(c => { try { c.destroy(); } catch(e){} });
    this.state.charts = {};
    if (this.state.map) { try { this.state.map.remove(); } catch(e){} this.state.map = null; }
  },

  /* ============ MODAL ============ */
  openModal(opts) {
    document.getElementById('modalTitle').textContent = opts.title || '';
    document.getElementById('modalSubtitle').textContent = opts.subtitle || '';
    document.getElementById('modalBody').innerHTML = opts.body || '';
    document.getElementById('modalFooter').innerHTML = opts.footer || '';
    const box = document.getElementById('modalBox');
    box.classList.toggle('large', !!opts.large);
    document.getElementById('modalOverlay').classList.add('is-open');
  },
  closeModal() {
    document.getElementById('modalOverlay').classList.remove('is-open');
  },

  confirm(title, message, onConfirm) {
    this.openModal({
      title,
      body: `<p style="color:var(--text-soft);line-height:1.6;">${message}</p>`,
      footer: `
        <button class="btn btn-outline" onclick="App.closeModal()">Vazgeç</button>
        <button class="btn btn-danger" id="confirmYes">Evet, sil</button>`
    });
    setTimeout(() => {
      document.getElementById('confirmYes').onclick = () => {
        this.closeModal();
        onConfirm();
      };
    }, 50);
  },

  /* ============ TOAST ============ */
  toast(msg, type='') {
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    document.getElementById('toastHost').appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(8px)'; }, 2400);
    setTimeout(() => el.remove(), 2800);
  },

  /* ============ HELPERS ============ */
  fmtDate(d) {
    if (!d) return '—';
    const date = new Date(d);
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((date - today) / 86400000);
    if (diff === 0) return 'Bugün';
    if (diff === 1) return 'Yarın';
    if (diff === -1) return 'Dün';
    if (diff > -7 && diff < 0) return Math.abs(diff) + ' gün önce';
    return date.toLocaleDateString('tr-TR', { day:'numeric', month:'short', year: Math.abs(diff) > 180 ? 'numeric' : undefined });
  },
  fmtMoney(n) { return '₺' + (n || 0).toLocaleString('tr-TR'); },
  fmtNum(n, d=1) { return Number(n||0).toLocaleString('tr-TR', { minimumFractionDigits:0, maximumFractionDigits:d }); },
  uid(prefix) { return prefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); },

  /* Filter helpers - aktif çiftlik */
  farmId() { return this.state.activeFarmId; },
  fParcels() { return db.parcels.filter(p => p.farmId === this.farmId()); },
  fSensors() { return db.sensors.filter(s => s.farmId === this.farmId()); },
  fTasks() { return db.tasks.filter(t => t.farmId === this.farmId()); },
  fExpenses() { return db.expenses.filter(e => e.farmId === this.farmId()); },
  fRevenues() { return db.revenues.filter(r => r.farmId === this.farmId()); },
  fInventory() { return db.inventory.filter(i => i.farmId === this.farmId()); },
  fAlerts() { return db.alerts.filter(a => a.farmId === this.farmId()); },
  fEquipment() { return db.equipment.filter(e => e.farmId === this.farmId()); },
  fFuelLogs() { return db.fuelLogs.filter(f => f.farmId === this.farmId()); },
  fFuelTanks() { return db.fuelTanks.filter(t => t.farmId === this.farmId()); },
  fEnergy() { return db.energySystems.filter(e => e.farmId === this.farmId()); },
  fLiving() { return db.livingExpenses.filter(l => l.farmId === this.farmId()); },
  fWarehouses() { return db.warehouses.filter(w => w.farmId === this.farmId()); },
  fMembers() { return db.memberships.filter(m => m.farmId === this.farmId()); },
  fWeather() { return db.weather[this.farmId()] || db.weather.f1; },

  /* Sayfa render fonksiyonları (alt parçalarda doldurulacak) */
  pages: {},
  hooks: {}
};

/* Sensör tip metadatası */
const sensorMeta = {
  soil_moisture:    { label:'Toprak Nemi',     icon:'droplet' },
  soil_temperature: { label:'Toprak Sıcaklığı', icon:'thermometer' },
  soil_ph:          { label:'Toprak pH',       icon:'flask' },
  soil_ec:          { label:'EC / Tuzluluk',   icon:'zap' },
  air_temperature:  { label:'Hava Sıcaklığı',  icon:'sun' },
  air_humidity:     { label:'Hava Nemi',       icon:'cloud' },
  light:            { label:'Işık Seviyesi',   icon:'sun' },
  wind:             { label:'Rüzgar',          icon:'wind' },
  rainfall:         { label:'Yağış',           icon:'cloud-rain' },
  tank_level:       { label:'Tank Seviye',     icon:'database' },
  water_pressure:   { label:'Su Basıncı',      icon:'gauge' }
};

const taskTypeLabel = (t) => ({
  irrigation:'Sulama', pesticide:'İlaçlama', fertilize:'Gübreleme',
  pruning:'Budama', harvest:'Hasat', maintenance:'Bakım',
  analysis:'Analiz', planting:'Ekim/Dikim', other:'Diğer'
}[t] || t);

const taskStatusLabel = (s) => ({ planned:'Planlandı', in_progress:'Devam ediyor', completed:'Tamamlandı', overdue:'Gecikti' }[s] || s);
const taskBadge = (s) => ({ planned:'muted', in_progress:'info', completed:'success', overdue:'danger' }[s] || 'muted');
const priorityLabel = (p) => ({ low:'Düşük', medium:'Orta', high:'Yüksek', urgent:'Acil' }[p] || p);
const priorityBadge = (p) => ({ low:'muted', medium:'info', high:'warn', urgent:'danger' }[p] || 'muted');
</script>
<script>
/* ===========================================================
   PAGE RENDERERS — Bölüm 1
   Dashboard, Parcels, Sensors, Weather, Irrigation, Tasks
   =========================================================== */

App.pages.dashboard = function() {
  const farm = db.farms.find(f => f.id === this.farmId());
  const parcels = this.fParcels();
  const sensors = this.fSensors();
  const tasks = this.fTasks();
  const expenses = this.fExpenses();
  const revenues = this.fRevenues();
  const alerts = this.fAlerts();
  const weather = this.fWeather();

  const totalArea = parcels.reduce((s,p) => s + p.areaDa, 0);
  const activeCrops = new Set(parcels.filter(p => p.status === 'growing').map(p => p.crop)).size;
  const todayTasks = tasks.filter(t => t.status !== 'completed').length;
  const totalRev = revenues.reduce((s,r) => s + r.total, 0);
  const totalExp = expenses.reduce((s,e) => s + e.amount, 0);
  const profit = totalRev - totalExp;
  const margin = totalRev > 0 ? ((profit/totalRev)*100).toFixed(1) : '0.0';

  return `
    <div class="grid grid-12">
      <div class="col-12 fade-up">
        <div class="hero-card">
          <div class="hero-greeting">Hoş geldin, ${this.state.user.name.split(' ')[0]}</div>
          <h2 class="hero-title">${farm.name} <em>seni bekliyor.</em></h2>
          <p style="margin-top:10px;color:rgba(236,246,239,0.7);max-width:560px;">
            ${farm.city}/${farm.district} · ${this.fmtNum(totalArea,1)} dönüm · ${parcels.length} parsel · ${sensors.length} sensör · ${this.roleLabel(this.currentRole())} olarak görüntülüyorsun
          </p>
          <div class="hero-meta">
            <div class="item"><span class="item-label">Bugün</span><span class="item-value">${weather.current.temp}°C ${weather.current.icon}</span></div>
            <div class="item"><span class="item-label">Aktif uyarı</span><span class="item-value">${alerts.filter(a => !a.isRead).length}</span></div>
            <div class="item"><span class="item-label">Açık görev</span><span class="item-value">${todayTasks}</span></div>
            <div class="item"><span class="item-label">Net kâr</span><span class="item-value">${this.fmtMoney(profit)}</span></div>
          </div>
        </div>
      </div>

      <div class="col-3 fade-up"><div class="kpi">
        <div class="kpi-icon">${this.iconSvg('layers')}</div>
        <div class="kpi-label">Toplam Alan</div>
        <div class="kpi-value">${this.fmtNum(totalArea,1)} <span style="font-size:14px;color:var(--text-muted);font-weight:500;">dönüm</span></div>
        <span class="kpi-trend up">${parcels.length} parsel</span>
      </div></div>

      <div class="col-3 fade-up"><div class="kpi">
        <div class="kpi-icon gold">${this.iconSvg('trending')}</div>
        <div class="kpi-label">Aktif Ürünler</div>
        <div class="kpi-value">${activeCrops}</div>
        <span class="kpi-trend up">${parcels.filter(p=>p.status==='growing').length} parselde</span>
      </div></div>

      <div class="col-3 fade-up"><div class="kpi">
        <div class="kpi-icon sky">${this.iconSvg('dollar')}</div>
        <div class="kpi-label">Net Kâr</div>
        <div class="kpi-value">₺${(profit/1000).toFixed(1)}K</div>
        <span class="kpi-trend ${profit>=0?'up':'down'}">${profit>=0?'↑':'↓'} %${margin} marj</span>
      </div></div>

      <div class="col-3 fade-up"><div class="kpi">
        <div class="kpi-icon danger">${this.iconSvg('alert')}</div>
        <div class="kpi-label">Aktif Uyarı</div>
        <div class="kpi-value">${alerts.length}</div>
        <span class="kpi-trend down">${alerts.filter(a=>a.severity==='danger').length} kritik</span>
      </div></div>

      <div class="col-8 fade-up"><div class="card">
        <div class="card-header">
          <div><div class="card-title">Toprak Nem Trendi</div><div class="card-subtitle">Son 24 saat — tüm parseller</div></div>
          <span class="badge success">Canlı</span>
        </div>
        <div class="chart-box"><canvas id="moistureChart"></canvas></div>
      </div></div>

      <div class="col-4 fade-up"><div class="card" style="height:100%;">
        <div class="card-header"><div class="card-title">7 Günlük Hava</div></div>
        <div style="display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:12px;">
          <div style="font-size:48px;line-height:1;">${weather.current.icon}</div>
          <div>
            <div style="font-family:var(--font-display);font-size:32px;font-weight:600;">${weather.current.temp}°C</div>
            <div style="font-size:12px;color:var(--text-muted);">${weather.current.condition}</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">
          ${weather.forecast.slice(0,7).map(d => `
            <div style="text-align:center;padding:6px 2px;">
              <div style="font-size:10px;color:var(--text-muted);font-weight:600;">${d.day}</div>
              <div style="font-size:18px;margin:4px 0;">${d.icon}</div>
              <div style="font-size:11px;font-weight:600;">${d.high}°</div>
              <div style="font-size:10px;color:var(--text-muted);">${d.low}°</div>
            </div>`).join('')}
        </div>
      </div></div>

      <div class="col-6 fade-up"><div class="card">
        <div class="card-header">
          <div><div class="card-title">Yaklaşan Görevler</div><div class="card-subtitle">Açık görevler</div></div>
          <button class="btn btn-ghost" onclick="App.navigateTo('tasks')">Tümü →</button>
        </div>
        ${tasks.filter(t => t.status !== 'completed').slice(0,5).map(t => {
          const p = parcels.find(x => x.id === t.parcelId);
          return `<div class="list-item">
            <div class="list-icon ${t.status === 'overdue' ? 'danger' : (t.priority === 'high' ? 'warn' : '')}">${this.iconSvg('check')}</div>
            <div class="list-text">
              <div class="list-title">${t.title}</div>
              <div class="list-sub">${p ? p.name : 'Genel'} · ${this.fmtDate(t.due)}</div>
            </div>
            <span class="badge ${taskBadge(t.status)}">${taskStatusLabel(t.status)}</span>
          </div>`;
        }).join('') || '<p style="color:var(--text-muted);font-size:13px;">Açık görev yok</p>'}
      </div></div>

      <div class="col-6 fade-up"><div class="card">
        <div class="card-header">
          <div><div class="card-title">Kritik Uyarılar</div><div class="card-subtitle">Aktif bildirimler</div></div>
          <button class="btn btn-ghost" onclick="App.navigateTo('alerts')">Tümü →</button>
        </div>
        ${alerts.slice(0,5).map(a => `
          <div class="list-item">
            <div class="list-icon ${a.severity}">${this.iconSvg('alert')}</div>
            <div class="list-text">
              <div class="list-title">${a.title}</div>
              <div class="list-sub">${a.time}</div>
            </div>
          </div>
        `).join('') || '<p style="color:var(--text-muted);font-size:13px;">Aktif uyarı yok</p>'}
      </div></div>
    </div>
  `;
};

App.hooks.dashboard = function() {
  const ctx = document.getElementById('moistureChart');
  if (!ctx) return;
  const labels = Array.from({length:25}, (_,i) => i === 24 ? 'Şimdi' : `${24-i}sa`);
  const colors = ['#2a7d47','#d4b85f','#3b9bc7','#8a6a3f'];
  const datasets = this.fParcels().slice(0,4).map((p,i) => ({
    label: p.name,
    data: Array.from({length:25}, (_,j) => Math.max(15, Math.min(75, p.moisture + Math.sin(j/3+i)*8 + (Math.random()-0.5)*4))),
    borderColor: colors[i],
    backgroundColor: colors[i]+'20',
    tension:0.4, fill:false, borderWidth:2, pointRadius:0
  }));
  this.state.charts.moisture = new Chart(ctx, {
    type:'line',
    data:{ labels, datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        legend:{ position:'top', labels:{ font:{family:"'Inter'",size:11}, color:'#455349', usePointStyle:true, padding:10 }},
        tooltip:{ backgroundColor:'#0a2316', padding:10, cornerRadius:8 }
      },
      scales:{
        x:{ grid:{display:false}, ticks:{font:{family:"'Inter'",size:10},color:'#7a8580'} },
        y:{ grid:{color:'#e6e1d6'}, ticks:{font:{family:"'Inter'",size:10},color:'#7a8580',callback:v=>v+'%'} }
      }
    }
  });
};

/* ============ PARCELS ============ */
App.pages.parcels = function() {
  const parcels = this.fParcels();
  const sensors = this.fSensors();
  return `
    <div style="margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <span class="badge muted">${parcels.length} parsel</span>
        <span class="badge success">${parcels.filter(p=>p.status==='growing').length} aktif</span>
        <span class="badge muted">${this.fmtNum(parcels.reduce((s,p)=>s+p.areaDa,0),1)} dönüm</span>
      </div>
      ${this.can('edit') ? `<button class="btn btn-gold" onclick="App.openParcelForm()">${this.iconSvg('plus')} Yeni Parsel</button>` : ''}
    </div>

    <div class="card fade-up" style="padding:0;overflow:hidden;margin-bottom:20px;">
      <div style="padding:18px 22px;border-bottom:1px solid var(--border);">
        <div class="card-title">Parsel Haritası</div>
        <div class="card-subtitle">Tüm parseller ve sensörler — ${db.farms.find(f=>f.id===this.farmId()).name}</div>
      </div>
      <div id="parcelMap" class="map-container" style="border-radius:0;border:none;height:380px;"></div>
    </div>

    ${parcels.length === 0 ? `
      <div class="card empty-state">
        <div class="empty-state-icon">${this.iconSvg('layers')}</div>
        <div class="empty-state-title">Henüz parsel yok</div>
        <div class="empty-state-text">Bu çiftliğe ilk parselini ekleyerek başla.</div>
        ${this.can('edit') ? `<button class="btn btn-gold" onclick="App.openParcelForm()">${this.iconSvg('plus')} İlk Parseli Ekle</button>` : ''}
      </div>
    ` : `
    <div class="grid grid-3" style="gap:16px;">
      ${parcels.map((p,i) => {
        const sCount = sensors.filter(s => s.parcelId === p.id).length;
        const moistureClass = p.moisture < 30 ? 'danger' : (p.moisture < 40 ? 'warn' : 'success');
        return `
          <div class="parcel-card fade-up" style="animation-delay:${i*0.05}s;">
            <div class="parcel-img ${p.cropClass}">
              ${this.iconSvg('layers')}
              <span class="area-tag">${p.areaDa} dönüm</span>
              ${this.can('edit') ? `
                <div class="actions-overlay">
                  <button onclick="event.stopPropagation();App.openParcelForm('${p.id}')" title="Düzenle">${this.iconSvg('edit')}</button>
                  ${this.can('delete') ? `<button onclick="event.stopPropagation();App.deleteParcel('${p.id}')" title="Sil">${this.iconSvg('trash')}</button>` : ''}
                </div>` : ''}
            </div>
            <div class="parcel-info">
              <div class="parcel-name">${p.name}</div>
              <div class="parcel-crop">${p.crop} · ${p.variety}</div>
              <div class="parcel-stats">
                <div class="parcel-stat">
                  <div class="parcel-stat-label">Nem</div>
                  <div class="parcel-stat-value ${moistureClass}">%${p.moisture}</div>
                </div>
                <div class="parcel-stat">
                  <div class="parcel-stat-label">NDVI</div>
                  <div class="parcel-stat-value">${p.ndvi.toFixed(2)}</div>
                </div>
                <div class="parcel-stat">
                  <div class="parcel-stat-label">Sensör</div>
                  <div class="parcel-stat-value">${sCount}</div>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('')}
    </div>`}
  `;
};

App.hooks.parcels = function() {
  const el = document.getElementById('parcelMap');
  if (!el) return;
  const farm = db.farms.find(f => f.id === this.farmId());
  this.state.map = L.map('parcelMap').setView([farm.lat, farm.lng], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap', maxZoom:19 }).addTo(this.state.map);
  this.fParcels().forEach(p => {
    const color = p.moisture < 30 ? '#c8473b' : p.moisture < 40 ? '#d99320' : '#2a7d47';
    L.circleMarker([p.lat, p.lng], { radius:14, color:'#fff', weight:3, fillColor:color, fillOpacity:0.85 })
      .addTo(this.state.map)
      .bindPopup(`<strong>${p.name}</strong><br>${p.crop} · ${p.areaDa} dönüm<br>Nem: %${p.moisture} · NDVI: ${p.ndvi}`);
  });
  this.fSensors().forEach(s => {
    L.circleMarker([s.lat, s.lng], { radius:5, color:'#0a2316', weight:1, fillColor:'#d4b85f', fillOpacity:1 })
      .addTo(this.state.map)
      .bindTooltip(`${sensorMeta[s.type]?.label || s.type}: ${s.value}${s.unit}`);
  });
  // Ekipmanları da haritada göster
  this.fEquipment().filter(e => e.status === 'active').forEach(e => {
    L.circleMarker([e.lat, e.lng], { radius:8, color:'#fff', weight:2, fillColor:'#3b9bc7', fillOpacity:0.9 })
      .addTo(this.state.map)
      .bindPopup(`🚜 <strong>${e.name}</strong><br>${e.currentTask || 'Boşta'}`);
  });
};

/* ============ SENSORS ============ */
App.pages.sensors = function() {
  const sensors = this.fSensors();
  const parcels = this.fParcels();
  return `
    <div style="margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <span class="badge success">${sensors.filter(s=>s.status==='active').length} aktif</span>
        <span class="badge warn">${sensors.filter(s=>s.battery<20).length} düşük pil</span>
        <span class="badge muted">${[...new Set(sensors.map(s=>s.type))].length} farklı tip</span>
      </div>
      ${this.can('edit') ? `<button class="btn btn-outline" onclick="App.openSensorForm()">${this.iconSvg('plus')} Sensör Ekle</button>` : ''}
    </div>

    ${sensors.length === 0 ? `
      <div class="card empty-state">
        <div class="empty-state-icon">${this.iconSvg('cpu')}</div>
        <div class="empty-state-title">Henüz sensör yok</div>
        <div class="empty-state-text">İlk IoT sensörünüzü tanımlayın.</div>
        ${this.can('edit') ? `<button class="btn btn-gold" onclick="App.openSensorForm()">${this.iconSvg('plus')} Sensör Ekle</button>` : ''}
      </div>
    ` : `
    <div class="grid grid-4" style="gap:16px;">
      ${sensors.map((s,i) => {
        const meta = sensorMeta[s.type] || { label:s.type, icon:'cpu' };
        const parcel = parcels.find(p => p.id === s.parcelId);
        let pct = 0;
        if (s.type === 'soil_moisture' || s.type === 'air_humidity' || s.type === 'tank_level') pct = s.value;
        else if (s.type === 'soil_temperature' || s.type === 'air_temperature') pct = (s.value/40)*100;
        else if (s.type === 'soil_ph') pct = (s.value/14)*100;
        else if (s.type === 'wind') pct = (s.value/50)*100;
        else pct = 60;
        const lowBat = s.battery < 20;
        return `
          <div class="sensor-card fade-up" style="animation-delay:${i*0.03}s;">
            <div class="head">
              <div>
                <div class="sensor-name">${meta.label}</div>
                <div class="sensor-loc">${parcel ? parcel.name : 'Genel'}</div>
              </div>
              <div class="sensor-icon">${this.iconSvg(meta.icon)}</div>
            </div>
            <div>
              <span class="sensor-value">${s.value}</span><span class="sensor-unit">${s.unit}</span>
            </div>
            <div class="sensor-bar"><span style="width:${Math.min(100,pct)}%"></span></div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:11px;color:var(--text-muted);">
              <span>${s.deviceId || s.name}</span>
              <span class="${lowBat?'badge danger':'badge muted'}" style="font-size:10px;padding:2px 6px;">🔋 ${s.battery}%</span>
            </div>
            ${this.can('edit') ? `
              <div style="display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
                <button class="btn btn-outline" style="padding:5px 10px;font-size:11px;flex:1;" onclick="App.openSensorForm('${s.id}')">${this.iconSvg('edit')} Düzenle</button>
                ${this.can('delete') ? `<button class="btn btn-danger" style="padding:5px 10px;font-size:11px;" onclick="App.deleteSensor('${s.id}')">${this.iconSvg('trash')}</button>` : ''}
              </div>` : ''}
          </div>
        `;
      }).join('')}
    </div>`}
  `;
};

            <div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;">Görüş</div><div style="font-family:var(--font-display);font-size:22px;font-weight:600;">10 km</div></div>

      <div class="col-4 fade-up"><div class="card">

          <div class="list-icon info">${this.iconSvg('cloud-rain')}</div>
          <div class="list-text"><div class="list-title">Yağış Bekleniyor</div><div class="list-sub">${weather.forecast.slice(0,3).reduce((s,d)=>s+d.rain,0)}mm</div></div>

/* ============ IRRIGATION ============ */
App.pages.irrigation = function() {
  const parcels = this.fParcels();
  const weather = this.fWeather();
  const recs = parcels.filter(p => p.status === 'growing').map(p => {
    const need = p.crop === 'Salatalık' ? 55 : p.crop === 'Domates' ? 45 : p.crop === 'Buğday' ? 35 : p.crop === 'Pamuk' ? 40 : 30;
    const rain48h = weather.forecast.slice(0,2).reduce((s,d)=>s+d.rain,0);
    let decision = 'ok', reason = `Nem yeterli (%${p.moisture}). Sulama gerekmez.`, badge = 'success', label = 'İyi';
    if (p.moisture < need-10 && rain48h < 5) { decision='irrigate'; reason=`Nem %${p.moisture}, hedef %${need}. 48 saatte ${rain48h}mm yağmur. Sulama gerekli.`; badge='danger'; label='Sula!'; }
    else if (p.moisture < need && rain48h >= 5) { decision='skip'; reason=`Nem düşük ama 48 saatte ${rain48h}mm yağmur bekleniyor. Sulamayı erteleyin.`; badge='info'; label='Bekle'; }
    else if (p.moisture < need) { decision='watch'; reason='Nem hedefin biraz altında. Yarınki tahminle tekrar değerlendirin.'; badge='warn'; label='Takip'; }
    return { ...p, need, rain48h, decision, reason, badge, label };
  });

  return `
    <div style="margin-bottom:20px;">
      <div class="card" style="background:linear-gradient(135deg,var(--brand-700),var(--brand-900));color:#fff;border:none;">
        <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;">
          <div style="font-size:48px;">💧</div>
          <div style="flex:1;min-width:240px;">
            <h3 style="font-family:var(--font-display);font-size:22px;font-weight:600;margin-bottom:6px;">Akıllı Sulama Karar Motoru</h3>
            <p style="color:rgba(236,246,239,0.75);font-size:13px;">Toprak nemi, ürün su ihtiyacı, 48 saatlik yağmur tahmini ve evapotranspirasyon hesaplanarak öneri üretilir.</p>
          </div>
          <div style="display:flex;gap:24px;flex-wrap:wrap;">
            <div><div style="font-size:11px;color:var(--gold-300);text-transform:uppercase;">Sulanacak</div><div style="font-family:var(--font-display);font-size:26px;font-weight:600;">${recs.filter(r=>r.decision==='irrigate').length}</div></div>
            <div><div style="font-size:11px;color:var(--gold-300);text-transform:uppercase;">Bekle</div><div style="font-family:var(--font-display);font-size:26px;font-weight:600;">${recs.filter(r=>r.decision==='skip').length}</div></div>
            <div><div style="font-size:11px;color:var(--gold-300);text-transform:uppercase;">İyi</div><div style="font-family:var(--font-display);font-size:26px;font-weight:600;">${recs.filter(r=>r.decision==='ok').length}</div></div>
          </div>
        </div>
      </div>
    </div>
    <div class="grid grid-2" style="gap:16px;">
      ${recs.map((r,i) => `
        <div class="card fade-up" style="animation-delay:${i*0.05}s;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">
            <div>
              <div style="font-family:var(--font-display);font-size:17px;font-weight:600;">${r.name}</div>
              <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${r.crop}</div>
            </div>
            <span class="badge ${r.badge}">${r.label}</span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px;">
            <div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;">Mevcut</div><div style="font-family:var(--font-display);font-size:22px;font-weight:600;">%${r.moisture}</div></div>
            <div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;">Hedef</div><div style="font-family:var(--font-display);font-size:22px;font-weight:600;">%${r.need}</div></div>
            <div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;">48s Yağış</div><div style="font-family:var(--font-display);font-size:22px;font-weight:600;">${r.rain48h}mm</div></div>
          </div>
          <div style="background:var(--surface-2);padding:12px 14px;border-radius:10px;font-size:13px;color:var(--text-soft);line-height:1.5;border-left:3px solid var(--brand-400);">
            ${r.reason}
          </div>
        </div>
      `).join('')}
    </div>
  `;
};

/* ============ TASKS ============ */
App.pages.tasks = function() {
  const tasks = this.fTasks();
  const parcels = this.fParcels();
  const planned = tasks.filter(t => t.status === 'planned');
  const inProgress = tasks.filter(t => t.status === 'in_progress');
  const overdue = tasks.filter(t => t.status === 'overdue');
  const completed = tasks.filter(t => t.status === 'completed');

  const taskItem = (t) => {
    const p = parcels.find(x => x.id === t.parcelId);
    const checked = t.status === 'completed';
    return `
      <div class="task-card ${checked?'done':''}">
        <div class="task-checkbox ${checked?'checked':''}" onclick="App.toggleTask('${t.id}')">${checked ? this.iconSvg('check') : ''}</div>
        <div class="task-content">
          <div class="task-title">${t.title}</div>
          <div class="task-meta">
            <span>${p ? p.name : 'Genel'}</span><span>·</span>
            <span>${this.fmtDate(t.due)}</span>
            <span class="badge ${priorityBadge(t.priority)}" style="margin-left:6px;">${priorityLabel(t.priority)}</span>
            <span class="badge muted" style="margin-left:4px;">${taskTypeLabel(t.type)}</span>
          </div>
        </div>
        <span class="badge ${taskBadge(t.status)}">${taskStatusLabel(t.status)}</span>
        ${this.can('edit') ? `
          <div style="display:flex;gap:4px;">
            <button class="icon-btn" style="width:32px;height:32px;" onclick="App.openTaskForm('${t.id}')">${this.iconSvg('edit')}</button>
            ${this.can('delete') ? `<button class="icon-btn" style="width:32px;height:32px;" onclick="App.deleteTask('${t.id}')">${this.iconSvg('trash')}</button>` : ''}
          </div>` : ''}
      </div>
    `;
  };

  return `
    <div style="margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <span class="badge muted">${tasks.length} toplam</span>
        <span class="badge danger">${overdue.length} gecikmiş</span>
        <span class="badge info">${inProgress.length} devam eden</span>
        <span class="badge success">${completed.length} tamamlanan</span>
      </div>
      ${this.can('edit') ? `<button class="btn btn-gold" onclick="App.openTaskForm()">${this.iconSvg('plus')} Yeni Görev</button>` : ''}
    </div>

    <div class="grid grid-4" style="gap:16px;margin-bottom:24px;">
      <div class="kpi"><div class="kpi-icon">${this.iconSvg('check')}</div><div class="kpi-label">Planlandı</div><div class="kpi-value">${planned.length}</div></div>
      <div class="kpi"><div class="kpi-icon sky">${this.iconSvg('check')}</div><div class="kpi-label">Devam Ediyor</div><div class="kpi-value">${inProgress.length}</div></div>
      <div class="kpi"><div class="kpi-icon danger">${this.iconSvg('alert')}</div><div class="kpi-label">Gecikmiş</div><div class="kpi-value">${overdue.length}</div></div>
      <div class="kpi"><div class="kpi-icon gold">${this.iconSvg('check')}</div><div class="kpi-label">Tamamlandı</div><div class="kpi-value">${completed.length}</div></div>
    </div>

    ${overdue.length ? `
      <div style="margin-bottom:20px;">
        <h3 style="font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:12px;color:var(--danger);">⚠️ Gecikmiş Görevler</h3>
        <div style="display:flex;flex-direction:column;gap:10px;">${overdue.map(taskItem).join('')}</div>
      </div>` : ''}

    <div style="margin-bottom:20px;">
      <h3 style="font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:12px;">Devam Eden ve Planlanan</h3>
      ${(inProgress.length + planned.length) > 0
        ? `<div style="display:flex;flex-direction:column;gap:10px;">${[...inProgress, ...planned].map(taskItem).join('')}</div>`
        : '<p style="color:var(--text-muted);font-size:13px;">Bekleyen görev yok</p>'}
    </div>

    ${completed.length ? `
      <div>
        <h3 style="font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:12px;color:var(--text-muted);">Tamamlananlar</h3>
        <div style="display:flex;flex-direction:column;gap:10px;">${completed.map(taskItem).join('')}</div>
      </div>` : ''}
  `;
};
</script>

App.pages.equipment = function() {
  const equipment = this.fEquipment();
  const active = equipment.filter(e => e.status === 'active');
  const idle = equipment.filter(e => e.status === 'idle');
  const maint = equipment.filter(e => e.status === 'maintenance');

  return `
    <div style="margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <span class="badge success">${active.length} aktif</span>
        <span class="badge muted">${idle.length} boşta</span>
        <span class="badge warn">${maint.length} bakımda</span>
        <span class="badge gold">${equipment.length} toplam</span>
      </div>
      ${this.can('edit') ? `<button class="btn btn-gold" onclick="App.openEquipmentForm()">${this.iconSvg('plus')} Ekipman Ekle</button>` : ''}
    </div>

    <div class="grid grid-4" style="gap:16px;margin-bottom:24px;">
      <div class="kpi"><div class="kpi-icon">${this.iconSvg('truck')}</div><div class="kpi-label">Toplam Ekipman</div><div class="kpi-value">${equipment.length}</div></div>
      <div class="kpi"><div class="kpi-icon">${this.iconSvg('activity')}</div><div class="kpi-label">Şu An Çalışan</div><div class="kpi-value">${active.length}</div></div>
      <div class="kpi"><div class="kpi-icon gold">${this.iconSvg('fuel')}</div><div class="kpi-label">Ort. Yakıt</div><div class="kpi-value">%${Math.round(equipment.filter(e=>e.fuelLevel).reduce((s,e)=>s+e.fuelLevel,0)/Math.max(1,equipment.filter(e=>e.fuelLevel).length))}</div></div>
      <div class="kpi"><div class="kpi-icon danger">${this.iconSvg('alert')}</div><div class="kpi-label">Bakım Yaklaşan</div><div class="kpi-value">${equipment.filter(e=>{const d=new Date(e.nextMaintenance);return (d-new Date())<30*86400000}).length}</div></div>
    </div>

    <div class="card fade-up" style="padding:0;overflow:hidden;margin-bottom:20px;">
      <div style="padding:18px 22px;border-bottom:1px solid var(--border);">
        <div class="card-title">Canlı Konum Haritası</div>
        <div class="card-subtitle">GPS takipli ekipmanlar — 🚜 aktif · 🟡 boşta</div>
      </div>
      <div id="equipmentMap" class="map-container" style="border-radius:0;border:none;height:340px;"></div>
    </div>

    ${equipment.length === 0 ? `
      <div class="card empty-state">
        <div class="empty-state-icon">${this.iconSvg('truck')}</div>
        <div class="empty-state-title">Henüz ekipman yok</div>
        <div class="empty-state-text">Traktör, pulluk, mibzer gibi ekipmanlarını ekleyerek başla.</div>
        ${this.can('edit') ? `<button class="btn btn-gold" onclick="App.openEquipmentForm()">${this.iconSvg('plus')} İlk Ekipmanı Ekle</button>` : ''}
      </div>
    ` : `
    <div class="grid grid-2" style="gap:16px;margin-bottom:24px;">
      ${equipment.map((e,i) => {
        const op = e.operator ? db.users.find(u => u.id === e.operator) : null;
        const fuelClass = !e.fuelLevel ? '' : e.fuelLevel < 20 ? 'danger' : e.fuelLevel < 40 ? 'warn' : 'success';
        return `
          <div class="equipment-card fade-up" style="animation-delay:${i*0.04}s;">
            <div class="equipment-icon">${this.iconSvg('truck')}</div>
            <div style="flex:1;min-width:0;">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
                <div>
                  <div style="font-family:var(--font-display);font-size:16px;font-weight:600;">${e.name}</div>
                  <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${e.model} · ${e.year}${e.plate?' · '+e.plate:''}</div>
                </div>
                <div>
                  <span class="equipment-status-dot ${e.status}"></span>
                  <span class="badge ${e.status==='active'?'success':e.status==='maintenance'?'warn':'muted'}">${e.status==='active'?'Aktif':e.status==='maintenance'?'Bakımda':'Boşta'}</span>
                </div>
              </div>
              ${e.currentTask ? `<div style="margin-top:8px;font-size:12px;color:var(--brand-700);font-weight:500;">📍 ${e.currentTask}</div>` : ''}

App.hooks.equipment = function() {
  const el = document.getElementById('equipmentMap');

/* ============ FUEL TRACKING ============ */
App.pages.fuel = function() {
  const tanks = this.fFuelTanks();
  const logs = this.fFuelLogs();
  const equipment = this.fEquipment();
  const monthFills = logs.filter(l => l.type === 'fill');
  const monthUsage = logs.filter(l => l.type === 'usage');
  const totalCost = logs.reduce((s,l) => s + l.cost, 0);
  const totalLiters = logs.filter(l => l.type === 'fill').reduce((s,l) => s + l.liters, 0);
  const avgPrice = totalLiters > 0 ? (logs.filter(l=>l.type==='fill').reduce((s,l)=>s+l.cost,0) / totalLiters).toFixed(2) : 0;

  return `
    <div style="margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <span class="badge gold">${tanks.length} tank</span>
        <span class="badge info">${monthFills.length} dolum</span>
        <span class="badge muted">${monthUsage.length} kullanım kaydı</span>
      </div>
      ${this.can('edit') ? `<div style="display:flex;gap:8px;">
        <button class="btn btn-outline" onclick="App.openFuelTankForm()">${this.iconSvg('plus')} Tank</button>
        <button class="btn btn-gold" onclick="App.openFuelLogForm()">${this.iconSvg('plus')} Yakıt Kaydı</button>
      </div>` : ''}
    </div>

    <div class="grid grid-4" style="gap:16px;margin-bottom:24px;">
      <div class="kpi"><div class="kpi-icon gold">${this.iconSvg('fuel')}</div><div class="kpi-label">Toplam Tank Kapasite</div><div class="kpi-value">${this.fmtNum(tanks.reduce((s,t)=>s+t.capacity,0),0)} L</div></div>
      <div class="kpi"><div class="kpi-icon">${this.iconSvg('database')}</div><div class="kpi-label">Mevcut Stok</div><div class="kpi-value">${this.fmtNum(tanks.reduce((s,t)=>s+t.currentLevel,0),0)} L</div></div>
      <div class="kpi"><div class="kpi-icon sky">${this.iconSvg('dollar')}</div><div class="kpi-label">Bu Dönem Maliyet</div><div class="kpi-value">${this.fmtMoney(totalCost)}</div></div>
      <div class="kpi"><div class="kpi-icon earth">${this.iconSvg('trending')}</div><div class="kpi-label">Ort. Birim Fiyat</div><div class="kpi-value">₺${avgPrice}<span style="font-size:14px;color:var(--text-muted);">/L</span></div></div>
    </div>

    <div class="grid grid-12" style="gap:18px;">
      <div class="col-6 fade-up"><div class="card">
        <div class="card-header"><div><div class="card-title">Yakıt Tankları</div><div class="card-subtitle">Çiftlik içi mazot depoları</div></div></div>
        ${tanks.length === 0 ? '<p style="color:var(--text-muted);font-size:13px;">Henüz tank kaydı yok.</p>' : tanks.map(t => {
          const pct = (t.currentLevel / t.capacity) * 100;
          const cls = pct < 20 ? 'danger' : pct < 40 ? 'warn' : 'success';
          return `
            <div style="padding:14px 0;border-bottom:1px solid var(--border);">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                <div>
                  <div style="font-weight:600;">${t.name}</div>
                  <div style="font-size:11px;color:var(--text-muted);">${t.type} · son dolum ${this.fmtDate(t.lastFilled)}</div>
                </div>
                <div style="text-align:right;">
                  <div style="font-family:var(--font-display);font-size:20px;font-weight:600;">${this.fmtNum(t.currentLevel,0)}<span style="font-size:13px;color:var(--text-muted);">/${t.capacity}L</span></div>
                  <span class="badge ${cls}">${pct.toFixed(0)}%</span>
                </div>
              </div>
              <div class="sensor-bar"><span style="width:${pct}%;${cls==='danger'?'background:var(--danger);':cls==='warn'?'background:var(--warn);':''}"></span></div>
            </div>
          `;
        }).join('')}
      </div></div>

      <div class="col-6 fade-up"><div class="card">
        <div class="card-header"><div class="card-title">Aylık Yakıt Tüketimi</div></div>
        <div class="chart-box"><canvas id="fuelChart"></canvas></div>
      </div></div>

      <div class="col-12 fade-up"><div class="card">
        <div class="card-header"><div class="card-title">Yakıt Hareketleri</div><div class="card-subtitle">Son ${logs.length} kayıt</div></div>
        ${logs.length === 0 ? '<p style="color:var(--text-muted);font-size:13px;">Henüz yakıt hareketi yok.</p>' : `
        <table class="table">
          <thead><tr><th>Tarih</th><th>Tip</th><th>Ekipman</th><th>Litre</th><th>Birim</th><th>Toplam</th><th>İstasyon</th>${this.can('edit')?'<th></th>':''}</tr></thead>
          <tbody>
            ${logs.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).map(l => {
              const eq = equipment.find(e => e.id === l.equipmentId);
              return `<tr>
                <td>${this.fmtDate(l.date)}</td>
                <td><span class="badge ${l.type==='fill'?'success':'info'}">${l.type==='fill'?'⛽ Dolum':'🚜 Kullanım'}</span></td>
                <td>${eq ? eq.name : '—'}</td>
                <td><strong>${l.liters} L</strong></td>
                <td>₺${l.pricePerL}</td>
                <td><strong>${this.fmtMoney(l.cost)}</strong></td>
                <td>${l.station}</td>
                ${this.can('edit') ? `<td class="actions">
                  <button onclick="App.openFuelLogForm('${l.id}')">${this.iconSvg('edit')}</button>
                  ${this.can('delete') ? `<button class="danger" onclick="App.deleteFuelLog('${l.id}')">${this.iconSvg('trash')}</button>` : ''}
                </td>` : ''}
              </tr>`;
            }).join('')}
          </tbody>
        </table>`}
      </div></div>
    </div>
  `;
};

/* ============ FINANCE ============ */
App.pages.finance = function() {
  if (!this.can('finance')) {
    return `<div class="card empty-state">
      <div class="empty-state-icon" style="background:rgba(200,71,59,0.1);color:var(--danger);">${this.iconSvg('alert')}</div>

    </div>`;
  }

  const expenses = this.fExpenses();
  const revenues = this.fRevenues();
  const totalExp = expenses.reduce((s,e) => s + e.amount, 0);
  const totalRev = revenues.reduce((s,r) => s + r.total, 0);
  const profit = totalRev - totalExp;
  const margin = totalRev > 0 ? ((profit/totalRev)*100).toFixed(1) : '0.0';

  // Kategorize
  const byCategory = {};
  expenses.forEach(e => { byCategory[e.category] = (byCategory[e.category] || 0) + e.amount; });

  return `
    <div style="margin-bottom:20px;display:flex;justify-content:flex-end;gap:8px;">
      ${this.can('edit') ? `
        <button class="btn btn-outline" onclick="App.openExpenseForm()">${this.iconSvg('plus')} Gider Ekle</button>
        <button class="btn btn-gold" onclick="App.openRevenueForm()">${this.iconSvg('plus')} Gelir Ekle</button>
      ` : ''}
    </div>

    <div class="grid grid-4" style="gap:16px;margin-bottom:24px;">
      <div class="kpi"><div class="kpi-icon">${this.iconSvg('trending')}</div><div class="kpi-label">Toplam Gelir</div><div class="kpi-value">${this.fmtMoney(totalRev)}</div></div>
      <div class="kpi"><div class="kpi-icon danger">${this.iconSvg('dollar')}</div><div class="kpi-label">Toplam Gider</div><div class="kpi-value">${this.fmtMoney(totalExp)}</div></div>
      <div class="kpi"><div class="kpi-icon ${profit>=0?'gold':'danger'}">${this.iconSvg('trending')}</div><div class="kpi-label">Net Kâr</div><div class="kpi-value">${this.fmtMoney(profit)}</div><span class="kpi-trend ${profit>=0?'up':'down'}">%${margin} marj</span></div>
      <div class="kpi"><div class="kpi-icon sky">${this.iconSvg('package')}</div><div class="kpi-label">Birim Maliyet</div><div class="kpi-value">₺${this.fmtNum(totalExp/Math.max(1,this.fParcels().reduce((s,p)=>s+p.areaDa,0)),0)}<span style="font-size:13px;color:var(--text-muted);">/dönüm</span></div></div>
    </div>

    <div class="grid grid-12" style="gap:18px;margin-bottom:24px;">
      <div class="col-6 fade-up"><div class="card">
        <div class="card-header"><div class="card-title">Gider Dağılımı</div></div>
        <div class="chart-box"><canvas id="expenseDonut"></canvas></div>
      </div></div>
      <div class="col-6 fade-up"><div class="card">
        <div class="card-header"><div class="card-title">Aylık Trend</div></div>
        <div class="chart-box"><canvas id="trendBar"></canvas></div>
      </div></div>

App.hooks.finance = function() {
  if (!this.can('finance')) return;
  const expenses = this.fExpenses();
  const byCategory = {};
  expenses.forEach(e => { byCategory[e.category] = (byCategory[e.category] || 0) + e.amount; });
  const labels = Object.keys(byCategory);
  const data = Object.values(byCategory);

  const dctx = document.getElementById('expenseDonut');
  if (dctx && labels.length) {
    this.state.charts.donut = new Chart(dctx, {
      type:'doughnut',
      data:{ labels, datasets:[{ data, backgroundColor:['#2a7d47','#d4b85f','#3b9bc7','#8a6a3f','#c8473b','#5a4226','#6db585','#d99320'], borderWidth:0 }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'right',labels:{font:{family:"'Inter'",size:11},color:'#455349',usePointStyle:true,padding:10}},tooltip:{backgroundColor:'#0a2316',padding:10,cornerRadius:8}}, cutout:'62%' }
    });
  }
  const bctx = document.getElementById('trendBar');
  if (bctx) {
    this.state.charts.trend = new Chart(bctx, {
      type:'bar',
      data:{ labels:['Eki','Kas','Ara','Oca','Şub','Mar','Nis'], datasets:[
        { label:'Gelir', data:[18400,42000,12000,8400,15600,28400,75600], backgroundColor:'rgba(42,125,71,0.85)', borderRadius:6 },
        { label:'Gider', data:[12500,8400,6800,4200,9800,14600,12400], backgroundColor:'rgba(212,184,95,0.85)', borderRadius:6 }
      ]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'top',labels:{font:{family:"'Inter'",size:11},color:'#455349',usePointStyle:true,padding:10}},tooltip:{backgroundColor:'#0a2316',padding:10,cornerRadius:8}}, scales:{x:{grid:{display:false},ticks:{font:{family:"'Inter'",size:11},color:'#7a8580'}},y:{grid:{color:'#e6e1d6'},ticks:{font:{family:"'Inter'",size:11},color:'#7a8580',callback:v=>'₺'+(v/1000)+'K'}}}}
    });
  }
};

App.pages.inventory = function() {
  const items = this.fInventory();
  const warehouses = this.fWarehouses();
  const lowStock = items.filter(i => i.stock < i.min);
  const totalValue = items.reduce((s,i) => s + i.stock * i.cost, 0);

  return `
    <div style="margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <span class="badge muted">${items.length} kalem</span>
        <span class="badge gold">${warehouses.length} depo</span>
        <span class="badge danger">${lowStock.length} kritik stok</span>
      </div>
      ${this.can('edit') ? `<div style="display:flex;gap:8px;">
        <button class="btn btn-outline" onclick="App.openWarehouseForm()">${this.iconSvg('plus')} Depo</button>
        <button class="btn btn-gold" onclick="App.openInventoryForm()">${this.iconSvg('plus')} Ürün Ekle</button>
      </div>` : ''}
    </div>

    <div class="grid grid-4" style="gap:16px;margin-bottom:24px;">
      <div class="kpi"><div class="kpi-icon">${this.iconSvg('package')}</div><div class="kpi-label">Toplam Kalem</div><div class="kpi-value">${items.length}</div></div>
      <div class="kpi"><div class="kpi-icon gold">${this.iconSvg('archive')}</div><div class="kpi-label">Toplam Depo</div><div class="kpi-value">${warehouses.length}</div></div>
      <div class="kpi"><div class="kpi-icon danger">${this.iconSvg('alert')}</div><div class="kpi-label">Kritik Stok</div><div class="kpi-value">${lowStock.length}</div></div>
      <div class="kpi"><div class="kpi-icon sky">${this.iconSvg('dollar')}</div><div class="kpi-label">Stok Değeri</div><div class="kpi-value">${this.fmtMoney(totalValue)}</div></div>
    </div>

    ${warehouses.length === 0 ? `
      <div class="card empty-state">
        <div class="empty-state-icon">${this.iconSvg('archive')}</div>
        <div class="empty-state-title">Önce bir depo oluştur</div>
        <div class="empty-state-text">Stoklarını organize edebilmek için en az bir depoya ihtiyacın var.</div>
        ${this.can('edit') ? `<button class="btn btn-gold" onclick="App.openWarehouseForm()">${this.iconSvg('plus')} Depo Oluştur</button>` : ''}
      </div>
    ` : warehouses.map(w => {
      const wItems = items.filter(i => i.warehouseId === w.id);
      const wValue = wItems.reduce((s,i) => s + i.stock * i.cost, 0);
      return `
        <div class="card fade-up" style="margin-bottom:16px;">
          <div class="card-header">
            <div style="display:flex;align-items:center;gap:12px;">
              <div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--gold-400),var(--brand-500));color:#0a2316;display:grid;place-items:center;">${this.iconSvg('archive')}</div>
              <div>
                <div class="card-title">${w.name}</div>
                <div class="card-subtitle">${w.location} · Kapasite ${w.capacity} ton · ${wItems.length} kalem · ${this.fmtMoney(wValue)} değer</div>
              </div>
            </div>
            ${this.can('edit') ? `<div style="display:flex;gap:6px;">
              <button class="icon-btn" onclick="App.openWarehouseForm('${w.id}')" title="Depo düzenle">${this.iconSvg('edit')}</button>

            </div>` : ''}
          </div>
          ${wItems.length === 0 ? '<p style="color:var(--text-muted);font-size:13px;padding:8px;">Bu depoda henüz ürün yok.</p>' : `
          <table class="table">
            <thead><tr><th>Ürün</th><th>Kategori</th><th>Stok</th><th>Min</th><th>Birim</th><th>Tedarikçi</th><th>Değer</th>${this.can('edit')?'<th></th>':''}</tr></thead>
            <tbody>
              ${wItems.map(i => {
                const status = i.stock < i.min ? '<span class="badge danger">Kritik</span>' : i.stock < i.min*1.5 ? '<span class="badge warn">Düşük</span>' : '<span class="badge success">Normal</span>';
                return `<tr>
                  <td><strong>${i.name}</strong> ${status}</td>
                  <td><span class="badge muted">${i.category}</span></td>
                  <td><strong>${i.stock}</strong></td>
                  <td>${i.min}</td>
                  <td>${i.unit}</td>
                  <td>${i.supplier}</td>
                  <td>${this.fmtMoney(i.stock * i.cost)}</td>
                  ${this.can('edit') ? `<td class="actions">
                    <button onclick="App.openInventoryForm('${i.id}')">${this.iconSvg('edit')}</button>
                    ${this.can('delete') ? `<button class="danger" onclick="App.deleteInventory('${i.id}')">${this.iconSvg('trash')}</button>` : ''}
                  </td>` : ''}
                </tr>`;
              }).join('')}
            </tbody>
          </table>`}
        </div>
      `;
    }).join('')}
  `;
};
